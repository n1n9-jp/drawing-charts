<script type="module">

// --------------- Quiz用Supabaseクライアント ---------------
const SUPABASE_URL = "https://vebhoeiltxspsurqoxvl.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlYmhvZWlsdHhzcHN1cnFveHZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUwNTY4MjMsImV4cCI6MjA4MDYzMjgyM30.5uf-D07Hb0JxL39X9yQ20P-5gFc1CRMdKWhDySrNZ0E";
const quizSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const DEFAULTS = {
  unit: "", yFormat: ",.0f", precision: 0, yExtent: 1.5, height: 300,
  margin: { top: 20, right: 130, bottom: 40, left: 55 },
  colors: { known: "#e41a1c", actual: "#4286bc", user: "#ffc700" },
  buttonText: "答え合わせ",
  drawPrompt: ["線を描いて", "予測してみよう"],
  afterRevealHTML: "",
};

function clamp(min, max, val) { return Math.max(min, Math.min(max, val)); }

// 手書き風ライン: データポイント間にjitterを加えてcurveBasisで補間
function sketchyLinePath(points) {
  const result = [];
  for (let i = 0; i < points.length - 1; i++) {
    const [x0, y0] = points[i];
    const [x1, y1] = points[i + 1];
    const steps = 8;
    for (let j = 0; j <= steps; j++) {
      const t = j / steps;
      const jitterScale = Math.sin(t * Math.PI) * 2.5;
      result.push([
        x0 + (x1 - x0) * t + (Math.random() - 0.5) * jitterScale,
        y0 + (y1 - y0) * t + (Math.random() - 0.5) * jitterScale,
      ]);
    }
  }
  return d3.line().curve(d3.curveBasis)(result);
}

// 手書き風の丸を描画
function drawSketchyCircle(parent, cx, cy, r, fillColor) {
  const dot = d3.sketchy.circle();
  dot.radius(r).cx(cx).cy(cy).fill(fillColor).stroke(fillColor).strokeWidth(6);
  parent.append("g").call(dot);
}

function mergeConfig(cfg) {
  return { ...DEFAULTS, ...cfg, margin: { ...DEFAULTS.margin, ...(cfg.margin || {}) }, colors: { ...DEFAULTS.colors, ...(cfg.colors || {}) } };
}

// --------------- ChartInstance (静的表示版) ---------------
class ChartInstance {
  constructor(parentEl, rawConfig) {
    this.cfg = mergeConfig(rawConfig);
    this.parentEl = parentEl;
    this._buildDOM();
    this._render();
  }

  _buildDOM() {
    const { cfg } = this;
    const wrap = document.createElement("div");
    wrap.className = "ydi-chart-wrap" + (cfg.style === "sketchy" ? " ydi-sketchy" : "");
    wrap.id = `ydi-${cfg.id}`;
    wrap.innerHTML = `
      <h2>${cfg.title}</h2>
      <div class="ydi-svg-container"></div>
      <div class="ydi-button-area"></div>
      <div class="ydi-after-reveal"></div>
    `;
    this.parentEl.appendChild(wrap);
    this.wrapEl = wrap;
    this.svgContainer = wrap.querySelector(".ydi-svg-container");

    this._predictionData = null;
    this._ro = new ResizeObserver(() => {
      this._render();
      if (this._predictionData) this.renderPrediction(this._predictionData);
    });
    this._ro.observe(this.svgContainer);
  }

  _render() {
    const { cfg } = this;
    const isMobile = window.innerWidth < 600;
    this.svgContainer.innerHTML = "";

    const totalWidth = this.svgContainer.offsetWidth || 560;
    const margin = { ...cfg.margin };
    if (isMobile) { margin.right = 70; margin.left = 40; }
    const width = totalWidth - margin.left - margin.right;
    const height = cfg.height;

    const data = cfg.data;
    const startX = data[0].x;
    const endX = data[data.length - 1].x;
    const drawStartX = cfg.drawStartX;
    const drawStartIndex = data.findIndex(d => d.x >= drawStartX);
    const xStep = data.length > 1 ? data[1].x - data[0].x : 1;

    const xScale = d3.scaleLinear().domain([startX, endX]).range([0, width]);
    const yMin = d3.min(data, d => d.y);
    const yMax = d3.max(data, d => d.y);
    const yPad = (yMax - yMin) * (cfg.yExtent - 1) || 1;
    const yDomainMin = yMin >= 0 ? 0 : yMin - yPad;
    const yDomainMax = yMax + yPad;
    const yScale = d3.scaleLinear().domain([yDomainMin, yDomainMax]).nice().range([height, 0]);

    const svg = d3.select(this.svgContainer).append("svg")
      .attr("width", totalWidth).attr("height", height + margin.top + margin.bottom);
    const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

    this.svg = svg; this.g = g; this.xScale = xScale; this.yScale = yScale;
    this.width = width; this.height = height; this.margin = margin;

    // Grid
    const gridG = g.append("g").attr("class", "ydi-grid");
    gridG.selectAll("line.v").data(data.map(d => d.x)).join("line")
      .attr("x1", d => xScale(d)).attr("x2", d => xScale(d)).attr("y1", 0).attr("y2", height);
    gridG.selectAll("line.h").data(yScale.ticks(5)).join("line")
      .attr("x1", 0).attr("x2", width).attr("y1", d => yScale(d)).attr("y2", d => yScale(d));

    const yFmt = d3.format(cfg.yFormat);

    // X axis
    g.append("g").attr("class", "axis x-axis").attr("transform", `translate(0,${height})`)
      .call(d3.axisBottom(xScale)
        .tickValues(data.map(d => d.x).filter((_, i) => i % (isMobile ? 4 : 2) === 0 || _ === endX))
        .tickFormat(d => d === startX ? d : "'" + String(d).slice(-2)).tickSize(6))
      .select(".domain").remove();

    // Y labels
    g.selectAll(".ydi-y-label").data(yScale.ticks(5)).join("text")
      .attr("class", "ydi-y-label").attr("x", -5).attr("y", d => yScale(d))
      .attr("dy", "0.35em").attr("text-anchor", "end").attr("fill", "#888").attr("font-size", 11)
      .text(d => yFmt(d));

    // Divider
    g.append("line").attr("class", "ydi-divider")
      .attr("x1", xScale(drawStartX)).attr("x2", xScale(drawStartX)).attr("y1", 0).attr("y2", height);

    const line = d3.line().x(d => xScale(d.x)).y(d => yScale(d.y));
    const sketchy = cfg.style === "sketchy";
    const toPoints = (arr) => arr.map(d => [xScale(d.x), yScale(d.y)]);

    // Known line
    const knownData = data.filter(d => d.x <= drawStartX);
    if (sketchy) {
      const kPts = toPoints(knownData);
      g.append("path").attr("class", "ydi-known-line")
        .attr("d", sketchyLinePath(kPts)).attr("stroke", d3.sketchy.randomColor(cfg.colors.known, 0.03))
        .style("stroke-width", 3.5).style("opacity", 0.35);
      g.append("path").attr("class", "ydi-known-line")
        .attr("d", sketchyLinePath(kPts)).attr("stroke", d3.sketchy.randomColor(cfg.colors.known, 0.03))
        .style("stroke-width", 2).style("opacity", 0.85);
    } else {
      g.append("path").attr("class", "ydi-known-line").attr("d", line(knownData)).attr("stroke", cfg.colors.known);
    }

    // Actual line (fully visible — no clipPath)
    const actualData = data.filter(d => d.x >= drawStartX);
    const area = d3.area().x(d => xScale(d.x)).y0(height).y1(d => yScale(d.y));
    g.append("path").attr("class", "ydi-area").attr("d", area(actualData)).attr("fill", cfg.colors.actual);
    if (sketchy) {
      const aPts = toPoints(actualData);
      g.append("path").attr("class", "ydi-actual-line")
        .attr("d", sketchyLinePath(aPts)).attr("stroke", d3.sketchy.randomColor(cfg.colors.actual, 0.03))
        .style("stroke-width", 3.5).style("opacity", 0.35);
      g.append("path").attr("class", "ydi-actual-line")
        .attr("d", sketchyLinePath(aPts)).attr("stroke", d3.sketchy.randomColor(cfg.colors.actual, 0.03))
        .style("stroke-width", 2).style("opacity", 0.85);
    } else {
      g.append("path").attr("class", "ydi-actual-line").attr("d", line(actualData)).attr("stroke", cfg.colors.actual);
    }

    // End point
    const endPt = data[data.length - 1];
    if (sketchy) {
      drawSketchyCircle(g, xScale(endPt.x), yScale(endPt.y), 4, cfg.colors.actual);
    } else {
      g.append("circle").attr("cx", xScale(endPt.x)).attr("cy", yScale(endPt.y)).attr("r", 5).attr("fill", cfg.colors.actual);
    }
    g.append("text").attr("class", "ydi-value-label").attr("x", xScale(endPt.x) + 10)
      .attr("y", yScale(endPt.y)).attr("dy", "0.35em").attr("fill", cfg.colors.actual).text(yFmt(endPt.y) + cfg.unit);

    // Start & mid markers
    const startPt = data[0];
    if (sketchy) {
      drawSketchyCircle(g, xScale(startPt.x), yScale(startPt.y), 4, cfg.colors.known);
    } else {
      g.append("circle").attr("cx", xScale(startPt.x)).attr("cy", yScale(startPt.y)).attr("r", 5).attr("fill", cfg.colors.known);
    }
    g.append("text").attr("class", "ydi-value-label").attr("x", xScale(startPt.x)).attr("y", yScale(startPt.y) - 12)
      .attr("text-anchor", "middle").attr("fill", cfg.colors.known).text(yFmt(startPt.y) + cfg.unit);

    const midPt = data[drawStartIndex];
    if (sketchy) {
      drawSketchyCircle(g, xScale(midPt.x), yScale(midPt.y), 4, cfg.colors.known);
    } else {
      g.append("circle").attr("cx", xScale(midPt.x)).attr("cy", yScale(midPt.y)).attr("r", 5).attr("fill", cfg.colors.known);
    }
    const midLabelDy = drawStartIndex > 0 && midPt.y > data[drawStartIndex - 1].y ? -12 : 16;
    g.append("text").attr("class", "ydi-value-label").attr("x", xScale(midPt.x) - 8)
      .attr("y", yScale(midPt.y) + midLabelDy).attr("text-anchor", "end").attr("fill", cfg.colors.known)
      .text(yFmt(midPt.y) + cfg.unit);

    // Store for renderPrediction
    this.yFmt = yFmt;
    this.data = data;
    this.drawStartX = drawStartX;
    this.endX = endX;
  }

  renderPrediction(predictionData) {
    this._predictionData = predictionData;
    const { xScale, yScale, g, cfg, width } = this;

    // Draw user prediction line
    const sketchy = cfg.style === "sketchy";
    const validPts = predictionData.filter(d => d.prediction != null);
    if (sketchy) {
      const userPts = validPts.map(d => [xScale(d.x), yScale(d.prediction)]);
      if (userPts.length > 1) {
        g.append("path").attr("class", "ydi-user-line")
          .attr("d", sketchyLinePath(userPts)).attr("stroke", d3.sketchy.randomColor(cfg.colors.user, 0.03))
          .style("stroke-width", 3.5).style("opacity", 0.35).style("stroke-dasharray", "none");
        g.append("path").attr("class", "ydi-user-line")
          .attr("d", sketchyLinePath(userPts)).attr("stroke", d3.sketchy.randomColor(cfg.colors.user, 0.03))
          .style("stroke-width", 2).style("opacity", 0.85).style("stroke-dasharray", "none");
      }
    } else {
      const userLine = d3.line().defined(d => d.prediction != null).x(d => xScale(d.x)).y(d => yScale(d.prediction));
      g.append("path").attr("class", "ydi-user-line").attr("d", userLine(predictionData)).attr("stroke", cfg.colors.user);
    }

    // User endpoint
    const lastPt = predictionData[predictionData.length - 1];
    if (lastPt) {
      if (sketchy) {
        drawSketchyCircle(g, xScale(lastPt.x), yScale(lastPt.prediction), 4, cfg.colors.user);
      } else {
        g.append("circle").attr("cx", xScale(lastPt.x)).attr("cy", yScale(lastPt.prediction)).attr("r", 5).attr("fill", cfg.colors.user);
      }

      const displayVal = cfg.precision
        ? this.yFmt(parseFloat(lastPt.prediction.toFixed(cfg.precision)))
        : this.yFmt(lastPt.prediction);

      // Avoid collision with actual end label
      const endPt = this.data[this.data.length - 1];
      let labelY = yScale(lastPt.prediction);
      if (Math.abs(labelY - yScale(endPt.y)) < 18) {
        labelY = labelY < yScale(endPt.y) ? yScale(endPt.y) - 18 : yScale(endPt.y) + 18;
      }

      g.append("text").attr("class", "ydi-value-label").attr("x", xScale(lastPt.x) + 10)
        .attr("y", labelY).attr("dy", "0.35em").attr("fill", cfg.colors.user)
        .text(displayVal + cfg.unit);
    }

    // Legend
    const legendG = g.append("g").attr("class", "ydi-legend").style("opacity", 1)
      .attr("transform", `translate(${width + 12},0)`);
    legendG.append("line").attr("x1", 0).attr("x2", 20).attr("y1", 0).attr("y2", 0)
      .attr("stroke", cfg.colors.user).attr("stroke-width", 3).attr("stroke-dasharray", "1 7").attr("stroke-linecap", "round");
    legendG.append("text").attr("class", "ydi-legend-label").attr("x", 26).attr("y", 0)
      .attr("dy", "0.35em").attr("fill", cfg.colors.user).text("予測");
    legendG.append("line").attr("x1", 0).attr("x2", 20).attr("y1", 22).attr("y2", 22)
      .attr("stroke", cfg.colors.actual).attr("stroke-width", 3).attr("stroke-linecap", "round");
    legendG.append("text").attr("class", "ydi-legend-label").attr("x", 26).attr("y", 22)
      .attr("dy", "0.35em").attr("fill", cfg.colors.actual).text("実際");
  }
}


// --------------- 初期化 ---------------
async function init() {
  const loadingEl = document.getElementById("share-loading");
  const errorEl = document.getElementById("share-error");
  const containerEl = document.getElementById("share-container");
  const resultEl = document.getElementById("share-result");

  const params = new URLSearchParams(window.location.search);
  const responseId = params.get("id");

  if (!responseId) {
    loadingEl.style.display = "none";
    errorEl.style.display = "block";
    errorEl.textContent = "回答IDが指定されていません";
    return;
  }

  try {
    const { data: response, error } = await quizSupabase
      .from("quiz_responses")
      .select("*, quiz_quizzes(*)")
      .eq("id", responseId)
      .single();

    if (error || !response || !response.quiz_quizzes) {
      loadingEl.style.display = "none";
      errorEl.style.display = "block";
      errorEl.textContent = "回答データが見つかりませんでした";
      return;
    }

    const quiz = response.quiz_quizzes;
    const cfg = { ...quiz.chart_config, id: responseId };
    if (!cfg.title) cfg.title = quiz.title;

    document.title = quiz.title + " — 結果をみる";

    // Update OGP meta tags dynamically
    const ogImageUrl = `${SUPABASE_URL}/storage/v1/object/public/quiz-og-images/${responseId}.png`;
    const sharePageUrl = `${DEPLOY_ORIGIN}/share.html?id=${responseId}`;
    const ogTitle = `${quiz.title} — ${response.score_label || "結果"}`;
    const ogDesc = "折れ線グラフの予測結果をチェック！あなたも予測してみよう";

    const setMeta = (attr, value, content) => {
      const el = document.querySelector(`meta[${attr}="${value}"]`);
      if (el) el.setAttribute("content", content);
    };
    setMeta("property", "og:title", ogTitle);
    setMeta("property", "og:description", ogDesc);
    setMeta("property", "og:url", sharePageUrl);
    setMeta("property", "og:image", ogImageUrl);
    setMeta("name", "twitter:title", ogTitle);
    setMeta("name", "twitter:description", ogDesc);
    setMeta("name", "twitter:image", ogImageUrl);

    // Render chart
    loadingEl.style.display = "none";
    containerEl.style.display = "block";
    resultEl.style.display = "block";

    const chart = new ChartInstance(containerEl, cfg);
    chart.renderPrediction(response.prediction_data);

    // Score badge + CTA
    let cls = "ydi-score-ok";
    if (response.total_error < 0.5) cls = "ydi-score-good";
    else if (response.total_error >= 2) cls = "ydi-score-off";

    const quizUrl = `${DEPLOY_ORIGIN}/quiz.html?id=${quiz.id}`;
    resultEl.innerHTML = `
      <div class="ydi-score ${cls}">${response.score_label || "回答済み"}</div>
      <div style="margin-top:20px">
        <a class="share-cta" href="${quizUrl}">自分もやってみる</a>
      </div>
    `;

  } catch (e) {
    loadingEl.style.display = "none";
    errorEl.style.display = "block";
    errorEl.textContent = "エラーが発生しました";
    console.error(e);
  }
}

init();
</script>
