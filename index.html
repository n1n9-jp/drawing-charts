<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>描いて答える折れ線グラフ</title>

<!-- dataviz.jp 共通ヘッダー -->
<script src="https://auth.dataviz.jp/lib/supabase.js"></script>
<script src="https://auth.dataviz.jp/lib/dataviz-auth-client.js"></script>
<!-- ツールヘッダー（保存/読込UI） -->
<script src="https://auth.dataviz.jp/lib/dataviz-tool-header.js" defer></script>
<!-- D3.js -->
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>

<link href="https://fonts.googleapis.com/css?family=Patrick+Hand" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  color: #333;
  background-color: #eff3ff;
  background-image: url("data:image/svg+xml,%3Csvg width='64' height='64' viewBox='0 0 64 64' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M8 16c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zm0-2c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zm33.414-6l5.95-5.95L45.95.636 40 6.586 34.05.636 32.636 2.05 38.586 8l-5.95 5.95 1.414 1.414L40 9.414l5.95 5.95 1.414-1.414L41.414 8zM40 48c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zm0-2c3.314 0 6-2.686 6-6s-2.686-6-6-6-6 2.686-6 6 2.686 6 6 6zM9.414 40l5.95-5.95-1.414-1.414L8 38.586l-5.95-5.95L.636 34.05 6.586 40l-5.95 5.95 1.414 1.414L8 41.414l5.95 5.95 1.414-1.414L9.414 40z' fill='%23bdd7e7' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
  line-height: 1.6;
}

.you-draw-it {
  max-width: 1200px;
  margin: 0 auto;
  padding: 124px 16px 20px;
}

.you-draw-it h1 {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 8px;
  text-align: center;
}

.you-draw-it .intro {
  text-align: center;
  color: #666;
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* --- Individual chart --- */
.ydi-chart-wrap {
  margin-bottom: 48px;
  position: relative;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  padding: 16px;
}

.ydi-chart-wrap h2 {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 12px;
  line-height: 1.4;
  text-align: center;
}

.ydi-chart-wrap svg {
  display: block;
  margin: 0 auto;
  overflow: visible;
  font: 300 13px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

/* Grid */
.ydi-grid line {
  stroke: #e0e0e0;
  stroke-width: 1;
  shape-rendering: crispEdges;
}

/* Axes */
.ydi-chart-wrap .axis path,
.ydi-chart-wrap .axis line {
  stroke: #ccc;
  shape-rendering: crispEdges;
}
.ydi-chart-wrap .axis text {
  fill: #888;
  font-size: 12px;
}

/* Lines */
.ydi-known-line {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.ydi-actual-line {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.ydi-area {
  opacity: 0.12;
}
.ydi-user-line {
  fill: none;
  stroke-width: 3;
  stroke-dasharray: 1 7;
  stroke-linecap: round;
}

/* Drag rect */
.ydi-drag-rect {
  fill: transparent;
  cursor: pointer;
  touch-action: none;
  pointer-events: all;
}

/* Flash rects */
.ydi-flash-rect {
  fill: rgba(255, 200, 0, 0.7);
  fill-opacity: 0;
}
.ydi-flash-rect.ydi-pending {
  animation: ydi-flash 0.6s ease-in-out alternate infinite;
}

@keyframes ydi-flash {
  from { fill-opacity: 0; }
  to   { fill-opacity: 0.5; }
}

/* Annotations */
.ydi-annotations rect { pointer-events: none; }
.ydi-annotations text { pointer-events: none; }

/* Annotation form */
.ydi-annotation-row { align-items: flex-end; }
.ydi-annotation-row .ann-remove-wrap {
  flex: 0 0 auto;
}
.ydi-annotation-row .ann-remove {
  background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #999;
  padding: 8px 12px; margin-bottom: 14px; display: block;
}
.ydi-annotation-row .ann-remove:hover { color: #c00; }
#add-annotation {
  background: none; border: 1px dashed #ccc; border-radius: 4px;
  padding: 6px 14px; font-size: 0.85rem; color: #888; cursor: pointer;
  margin-top: 4px;
}
#add-annotation:hover { border-color: #999; color: #555; }

/* Value labels */
.ydi-value-label {
  font-size: 13px;
  font-weight: 700;
}

/* Draw prompt */
.ydi-draw-prompt {
  font-size: 15px;
  font-weight: 600;
  fill: #999;
  text-anchor: middle;
  pointer-events: none;
  transition: opacity 0.3s;
}

/* Endpoint circles */
.ydi-endpoint {
  transition: opacity 0.3s;
}

/* --- State: drag started --- */
.ydi-drag-started .ydi-draw-prompt {
  opacity: 0;
}
.ydi-drag-started .ydi-flash-rect.ydi-pending {
  animation: ydi-flash 0.4s ease-in-out alternate infinite;
}

/* --- Button --- */
.ydi-button-area {
  text-align: center;
  margin-top: 12px;
  transition: opacity 0.3s;
}
.ydi-button {
  display: inline-block;
  padding: 10px 28px;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  background: #333;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  opacity: 0.25;
  pointer-events: none;
  transition: opacity 0.3s, background 0.2s;
}
.ydi-ready .ydi-button {
  opacity: 1;
  pointer-events: auto;
}
.ydi-publish-btn {
  opacity: 1 !important;
  pointer-events: auto !important;
}
.ydi-button:hover {
  background: #555;
}

/* --- After reveal --- */
.ydi-after-reveal {
  text-align: center;
  margin-top: 12px;
  font-size: 0.95rem;
  color: #555;
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  transition: opacity 0.5s 0.6s, max-height 0.5s 0.6s;
}
.ydi-guessed .ydi-button-area {
  opacity: 0;
  pointer-events: none;
}
.ydi-guessed .ydi-after-reveal {
  opacity: 1;
  max-height: 300px;
}
.ydi-guessed .ydi-drag-rect {
  pointer-events: none;
}

/* Score badge */
.ydi-score {
  display: inline-block;
  margin-top: 4px;
  padding: 4px 14px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.9rem;
}
.ydi-score-good { background: #d4edda; color: #155724; }
.ydi-score-ok   { background: #fff3cd; color: #856404; }
.ydi-score-off  { background: #f8d7da; color: #721c24; }

/* Download buttons */
.ydi-download-area {
  margin-top: 10px;
}
.ydi-download-btn {
  display: inline-block;
  padding: 5px 14px;
  margin: 0 4px;
  font-size: 13px;
  font-weight: 600;
  color: #555;
  background: #f0f0f0;
  border: 1px solid #ddd;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none;
}
.ydi-download-btn:hover {
  background: #e0e0e0;
}

/* --- Divider line between known and draw area --- */
.ydi-divider {
  stroke: #ccc;
  stroke-width: 1;
  stroke-dasharray: 4 3;
  shape-rendering: crispEdges;
}

/* --- Legend (shown after reveal) --- */
.ydi-legend {
  opacity: 0;
  transition: opacity 0.5s 0.8s;
}
.ydi-guessed .ydi-legend {
  opacity: 1;
}
.ydi-legend-label {
  font-size: 12px;
  font-weight: 600;
}

/* --- Load modal --- */
.ydi-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 10000;
  justify-content: center;
  align-items: center;
}
.ydi-modal-overlay.active {
  display: flex;
}
.ydi-modal {
  background: #fff;
  border-radius: 8px;
  width: 90%;
  max-width: 480px;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.ydi-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid #eee;
}
.ydi-modal-header h3 {
  margin: 0;
  font-size: 1rem;
}
.ydi-modal-close {
  background: none;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  color: #888;
  padding: 0 4px;
}
.ydi-modal-close:hover { color: #333; }
.ydi-modal-body {
  overflow-y: auto;
  padding: 12px 20px;
}
.ydi-modal-body .ydi-empty {
  text-align: center;
  color: #999;
  padding: 32px 0;
}
.ydi-project-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
  cursor: pointer;
  transition: background 0.15s;
}
.ydi-project-item:hover {
  background: #f8f8f8;
  margin: 0 -20px;
  padding: 10px 20px;
}
.ydi-project-item:last-child { border-bottom: none; }
.ydi-project-name {
  font-weight: 600;
  font-size: 0.95rem;
}
.ydi-project-date {
  font-size: 0.8rem;
  color: #999;
}

/* --- Save name dialog --- */
.ydi-save-dialog {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 10000;
  justify-content: center;
  align-items: center;
}
.ydi-save-dialog.active { display: flex; }
.ydi-save-dialog-inner {
  background: #fff;
  border-radius: 8px;
  padding: 24px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.ydi-save-dialog-inner h3 {
  margin: 0 0 12px;
  font-size: 1rem;
}
.ydi-save-dialog-inner input {
  width: 100%;
  padding: 8px 12px;
  font-size: 0.95rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  margin-bottom: 16px;
}
.ydi-save-dialog-inner input:focus {
  outline: none;
  border-color: #333;
}
.ydi-save-dialog-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.ydi-save-dialog-actions button {
  padding: 8px 20px;
  font-size: 0.9rem;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid #ccc;
  background: #f0f0f0;
}
.ydi-save-dialog-actions button.primary {
  background: #333;
  color: #fff;
  border-color: #333;
}
.ydi-save-dialog-actions button.primary:hover { background: #555; }

/* --- Quiz creation form --- */
.ydi-create {
  margin-bottom: 32px;
  padding: 20px;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  border: 1px solid #eee;
  border-radius: 8px;
}
.ydi-create h2 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-top: 0;
  margin-bottom: 0;
}
.ydi-create label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: #555;
  margin-bottom: 4px;
}
.ydi-create input[type="text"],
.ydi-create select {
  width: 100%;
  padding: 8px 12px;
  font-size: 0.95rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  margin-bottom: 14px;
}
.ydi-create input:focus,
.ydi-create select:focus {
  outline: none;
  border-color: #333;
}
.ydi-create .ydi-section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.ydi-create .ydi-section-header h2 {
  margin-bottom: 0;
}
.ydi-create .ydi-sample-select {
  width: 140px;
  padding: 6px 10px;
  font-size: 0.85rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  background: #fff;
  cursor: pointer;
}
.ydi-create .ydi-sample-select:focus {
  outline: none;
  border-color: #333;
}
.ydi-create .ydi-field-row {
  display: flex;
  gap: 12px;
}
.ydi-create .ydi-field-row > div {
  flex: 1;
}

/* Drop zone */
.ydi-dropzone {
  border: 2px dashed #ccc;
  border-radius: 8px;
  padding: 24px 16px;
  text-align: center;
  color: #999;
  font-size: 0.9rem;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 14px;
}
.ydi-dropzone:hover,
.ydi-dropzone.dragover {
  border-color: #666;
  background: #f0f0f0;
}
.ydi-dropzone.loaded {
  border-color: #4caf50;
  background: #e8f5e9;
  color: #2e7d32;
}
.ydi-dropzone input[type="file"] {
  display: none;
}
.ydi-data-preview {
  max-height: 150px;
  overflow-y: auto;
  font-size: 0.8rem;
  margin-bottom: 14px;
  border: 1px solid #eee;
  border-radius: 4px;
}
.ydi-data-preview table {
  width: 100%;
  border-collapse: collapse;
}
.ydi-data-preview th,
.ydi-data-preview td {
  padding: 4px 8px;
  text-align: right;
  border-bottom: 1px solid #f0f0f0;
}
.ydi-data-preview th {
  background: #f8f8f8;
  font-weight: 600;
  position: sticky;
  top: 0;
}
.ydi-preview-section {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid #eee;
}
.ydi-preview-section h3 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: #666;
}

/* --- Sketchy style overrides --- */
.ydi-chart-wrap.ydi-sketchy { background: #fffdf7; border-radius: 4px; box-shadow: 2px 3px 12px rgba(0,0,0,0.1); transform: rotate(-0.3deg); }
.ydi-chart-wrap.ydi-sketchy h2 { font-family: 'Patrick Hand', cursive; font-size: 1.3rem; }
.ydi-chart-wrap.ydi-sketchy svg { font: 300 14px/1.2 'Patrick Hand', cursive; }
.ydi-chart-wrap.ydi-sketchy .ydi-grid line { stroke: #c8ddf0; stroke-width: 0.8; opacity: 0.6; }
.ydi-chart-wrap.ydi-sketchy .axis path, .ydi-chart-wrap.ydi-sketchy .axis .domain { display: none; }
.ydi-chart-wrap.ydi-sketchy .axis .tick line { stroke: #bbb; stroke-width: 0.5; }
.ydi-chart-wrap.ydi-sketchy .axis text { fill: #555; font-size: 14px; font-family: 'Patrick Hand', cursive; }
.ydi-chart-wrap.ydi-sketchy .ydi-value-label { font-family: 'Patrick Hand', cursive; font-size: 14px; }
.ydi-chart-wrap.ydi-sketchy .ydi-legend-label { font-family: 'Patrick Hand', cursive; font-size: 13px; }
.ydi-chart-wrap.ydi-sketchy .ydi-draw-prompt { font-family: 'Patrick Hand', cursive; }

/* --- Two-column layout --- */
.ydi-two-column {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}
.ydi-left-panel {
  flex: 0 0 420px;
  min-width: 0;
}
.ydi-right-panel {
  flex: 1 1 0;
  min-width: 0;
}
.ydi-preview-sticky {
  position: -webkit-sticky;
  position: sticky;
  top: 80px;
  background: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  border: 1px solid #eee;
  border-radius: 8px;
  padding: 20px;
}
.ydi-preview-sticky .ydi-chart-wrap {
  margin-bottom: 0;
  box-shadow: none;
}

/* --- Accordion --- */
.ydi-accordion-step {
  border-bottom: 1px solid #eee;
}
.ydi-accordion-step:last-child {
  border-bottom: none;
}
.ydi-step-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  padding: 14px 0;
  user-select: none;
}
.ydi-step-header h2 {
  margin: 0;
  pointer-events: none;
}
.ydi-step-header .ydi-chevron {
  transition: transform 0.3s;
  font-size: 0.75rem;
  color: #999;
}
.ydi-accordion-step.open .ydi-chevron {
  transform: rotate(180deg);
}
.ydi-step-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}
.ydi-accordion-step.open .ydi-step-body {
  max-height: 2000px;
  padding-bottom: 8px;
}

/* --- Preview placeholder --- */
.ydi-preview-placeholder {
  border: 2px dashed #ccc;
  border-radius: 8px;
  padding: 60px 20px;
  text-align: center;
  color: #999;
  font-size: 0.9rem;
  background: #fafafa;
}

/* --- Responsive --- */
@media (max-width: 900px) {
  .ydi-two-column { flex-direction: column; }
  .ydi-left-panel { flex: none; width: 100%; }
  .ydi-right-panel { flex: none; width: 100%; }
  .ydi-preview-sticky { position: static; }
}
@media (max-width: 600px) {
  .you-draw-it { padding: 108px 8px 12px; }
  .you-draw-it h1 { font-size: 1.3rem; }
  .ydi-chart-wrap h2 { font-size: 1rem; }
  .ydi-draw-prompt { font-size: 13px; }
  .ydi-value-label { font-size: 11px; }
}
</style>
</head>
<body>

<dataviz-tool-header></dataviz-tool-header>

<div class="you-draw-it" id="app">
  <h1>描いて答える折れ線グラフ</h1>
  <p class="intro">データをアップロードして、クイズを作成しよう。</p>

  <div class="ydi-two-column">
    <!-- 左パネル: 設定フォーム -->
    <div class="ydi-left-panel">
      <div class="ydi-create" id="create-form">

        <!-- Step 1: データアップロード -->
        <div class="ydi-accordion-step open" data-step="1">
          <div class="ydi-step-header">
            <h2>1. データをアップロード</h2>
            <span class="ydi-chevron">&#9660;</span>
          </div>
          <div class="ydi-step-body">
            <div class="ydi-section-header" style="margin-bottom:8px">
              <select class="ydi-sample-select" id="sample-select">
                <option value="">サンプルデータ</option>
              </select>
            </div>
            <div class="ydi-dropzone" id="dropzone">
              <p>CSVファイルをドラッグ＆ドロップ、またはクリックして選択</p>
              <p style="font-size:0.8rem;margin-top:4px">形式: x,y（1行目はヘッダー）</p>
              <input type="file" id="file-input" accept=".csv,.json">
            </div>
            <div class="ydi-field-row" id="col-select-row" style="display:none; margin-top: 12px">
              <div>
                <label for="col-x">X軸（時系列）</label>
                <select id="col-x"></select>
              </div>
              <div>
                <label for="col-y">Y軸（数値）</label>
                <select id="col-y"></select>
              </div>
            </div>
            <div class="ydi-field-row" id="data-preview" style="display:none">
              <div class="ydi-data-preview" id="data-preview-x"></div>
              <div class="ydi-data-preview" id="data-preview-y"></div>
            </div>
          </div>
        </div>

        <!-- Step 2: 対象期間 -->
        <div class="ydi-accordion-step" data-step="2">
          <div class="ydi-step-header">
            <h2>2. 対象期間</h2>
            <span class="ydi-chevron">&#9660;</span>
          </div>
          <div class="ydi-step-body">
            <div class="ydi-field-row" id="period-select-row" style="display:none">
              <div>
                <label for="period-start">開始</label>
                <select id="period-start" disabled>
                  <option value="">データを先にアップロード</option>
                </select>
              </div>
              <div>
                <label for="period-end">終了</label>
                <select id="period-end" disabled>
                  <option value="">データを先にアップロード</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Step 3: クイズの設定 -->
        <div class="ydi-accordion-step" data-step="3">
          <div class="ydi-step-header">
            <h2>3. クイズの設定</h2>
            <span class="ydi-chevron">&#9660;</span>
          </div>
          <div class="ydi-step-body">
            <label for="quiz-title">タイトル（質問文）</label>

            <div class="ydi-field-row">

                  <option value="">データを先にアップロード</option>

                  <option value="sketchy">手書き風</option>

              <div></div>

        </div>

        <!-- Step 4: アノテーション -->
        <div class="ydi-accordion-step" data-step="4">
          <div class="ydi-step-header">
            <h2>4. 期間アノテーション（任意）</h2>

      </div>

    <!-- 右パネル: プレビュー -->
    <div class="ydi-right-panel">
      <div class="ydi-preview-sticky">
        <div class="ydi-preview-placeholder" id="preview-placeholder">
          <p>データをアップロードすると<br>プレビューが表示されます</p>
        </div>
        <div class="ydi-preview-section" id="preview-section" style="display:none">
          <div id="preview-container"></div>
        </div>

</div>

<!-- 読込モーダル -->

      <button id="save-cancel">キャンセル</button>
      <button class="primary" id="save-confirm">保存</button>
    </div>

<script type="module">
// ============================================================
//  YouDrawIt — 描いて答える折れ線グラフ テンプレート
// ============================================================

// --------------- アップロードデータ管理 ---------------
let uploadedData = null; // [{x, y}, ...]
let csvRawRows = null;   // CSVの生データ（列選択変更用）
let csvCols = null;      // CSVの列名リスト
let currentXFormat = "year"; // "year" or "yyyymm"

// --------------- デフォルト設定 ---------------
const DEFAULTS = {
  unit: "",
  yFormat: ",.0f",
  precision: 0,
  yExtent: 1.5,
  height: 300,
  margin: { top: 20, right: 130, bottom: 40, left: 55 },
  colors: { known: "#7570b3", actual: "#1b9e77", user: "#d95f02" },
  buttonText: "答え合わせ",
  drawPrompt: ["線を描いて", "予想してみよう"],
  afterRevealHTML: "",
};

// --------------- ユーティリティ ---------------
function clamp(min, max, val) {
  return Math.max(min, Math.min(max, val));
}

function sketchyLinePath(points) {
  const result = [];
  for (let i = 0; i < points.length - 1; i++) {
    const [x0, y0] = points[i];
    const [x1, y1] = points[i + 1];
    const steps = 8;
    for (let j = 0; j <= steps; j++) {
      const t = j / steps;
      const jitterScale = Math.sin(t * Math.PI) * 2.5;
      result.push([
        x0 + (x1 - x0) * t + (Math.random() - 0.5) * jitterScale,
        y0 + (y1 - y0) * t + (Math.random() - 0.5) * jitterScale,
      ]);
    }
  }
  return d3.line().curve(d3.curveBasis)(result);
}

function drawSketchyCircle(parent, cx, cy, r, fillColor) {
  const dot = d3.sketchy.circle();
  dot.radius(r).cx(cx).cy(cy).fill(fillColor).stroke(fillColor).strokeWidth(6);
  parent.append("g").call(dot);
}

// 右端ラベル群の重なりを解消する
// items: [{y, height, el}] — y座標でソートされた要素リスト
function resolveVerticalOverlaps(items, minGap) {
  if (items.length < 2) return;
  items.sort((a, b) => a.y - b.y);
  for (let i = 1; i < items.length; i++) {
    const prev = items[i - 1];
    const curr = items[i];
    const overlap = (prev.y + prev.height + minGap) - curr.y;
    if (overlap > 0) {
      curr.y = prev.y + prev.height + minGap;
      if (curr.el) curr.el.attr("y", curr.y);
      if (curr.legendG) curr.legendG.attr("transform", `translate(${curr.legendX},${curr.y})`);
    }
  }
}

function mergeConfig(cfg) {
  return {
    ...DEFAULTS,
    ...cfg,
    margin: { ...DEFAULTS.margin, ...(cfg.margin || {}) },
    colors: { ...DEFAULTS.colors, ...(cfg.colors || {}) },
  };
}

// --------------- ChartInstance ---------------
class ChartInstance {
  constructor(parentEl, rawConfig) {
    this.cfg = mergeConfig(rawConfig);
    this.state = "idle"; // idle | drawing | ready | revealed
    this.parentEl = parentEl;

    this._buildDOM();
    this._render();
  }

  _buildDOM() {
    const { cfg } = this;
    const wrap = document.createElement("div");
    wrap.className = "ydi-chart-wrap" + (cfg.style === "sketchy" ? " ydi-sketchy" : "");
    wrap.id = `ydi-${cfg.id}`;

    wrap.innerHTML = `
      <h2>${cfg.title}</h2>
      <div class="ydi-svg-container"></div>
      <div class="ydi-button-area">
        <button class="ydi-button ydi-publish-btn">公開</button>
      </div>
      <div class="ydi-after-reveal">${cfg.afterRevealHTML}</div>
    `;

    this.parentEl.appendChild(wrap);
    this.wrapEl = wrap;
    this.svgContainer = wrap.querySelector(".ydi-svg-container");
    this.buttonEl = wrap.querySelector(".ydi-button");
    this.buttonEl.addEventListener("click", () => publishQuiz());
  }

  _render() {
    const { cfg } = this;
    const isMobile = window.innerWidth < 600;

    // Clear previous SVG (for resize)
    this.svgContainer.innerHTML = "";

    const totalWidth = this.svgContainer.offsetWidth || 560;
    const margin = { ...cfg.margin };
    if (isMobile) {
      margin.right = 70;
      margin.left = 40;
    }
    const width = totalWidth - margin.left - margin.right;
    const height = cfg.height;

    // Data indices
    const data = cfg.data;
    const startX = data[0].x;
    const endX = data[data.length - 1].x;
    const drawStartX = cfg.drawStartX;
    const drawStartIndex = data.findIndex(d => d.x >= drawStartX);
    const xStep = data.length > 1 ? data[1].x - data[0].x : 1;

    // Scales
    const xScale = d3.scaleLinear()
      .domain([startX, endX])
      .range([0, width]);

    const yMin = d3.min(data, d => d.y);
    const yMax = d3.max(data, d => d.y);
    const yPad = (yMax - yMin) * (cfg.yExtent - 1) || 1;
    const yDomainMin = yMin >= 0 ? 0 : yMin - yPad;
    const yDomainMax = yMax + yPad;
    const yScale = d3.scaleLinear()
      .domain([yDomainMin, yDomainMax])
      .nice()
      .range([height, 0]);

    // SVG
    const svg = d3.select(this.svgContainer)
      .append("svg")
      .attr("width", totalWidth)
      .attr("height", height + margin.top + margin.bottom);

    const g = svg.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    this.svg = svg;
    this.g = g;
    this.xScale = xScale;
    this.yScale = yScale;
    this.width = width;
    this.height = height;
    this.margin = margin;

    // --- Grid ---
    const gridG = g.append("g").attr("class", "ydi-grid");
    // Vertical
    gridG.selectAll("line.v")
      .data(data.map(d => d.x))
      .join("line")
      .attr("x1", d => xScale(d))
      .attr("x2", d => xScale(d))
      .attr("y1", 0)
      .attr("y2", height);
    // Horizontal
    gridG.selectAll("line.h")
      .data(yScale.ticks(5))
      .join("line")
      .attr("x1", 0)
      .attr("x2", width)
      .attr("y1", d => yScale(d))
      .attr("y2", d => yScale(d));

    // --- Annotation backgrounds (behind data lines) ---
    const annLabels = [];
    if (cfg.annotations && cfg.annotations.length > 0) {
      const annG = g.append("g").attr("class", "ydi-annotations");
      cfg.annotations.forEach((ann, i) => {
        const x1 = Math.max(0, xScale(ann.startX));
        const x2 = Math.min(width, xScale(ann.endX));
        const w = x2 - x1;
        if (w <= 0) return;
        annG.append("rect")
          .attr("x", x1).attr("y", 0)
          .attr("width", w).attr("height", height)
          .attr("fill", "#000").attr("opacity", i % 2 === 0 ? 0.04 : 0.08);
        if (ann.label) annLabels.push({ x: (x1 + x2) / 2, label: ann.label });
      });
    }

    // --- Axes ---
    const yFmt = d3.format(cfg.yFormat);

    // X axis
    const xAxisG = g.append("g")
      .attr("class", "axis x-axis")
      .attr("transform", `translate(0,${height})`)
      .call(
        d3.axisBottom(xScale)
          .tickValues((() => {
            const allX = data.map(d => d.x);
            const tickWidth = cfg.xFormat === "yyyymm" ? 70 : 40;
            const maxTicks = Math.max(2, Math.floor(width / tickWidth));
            const step = Math.max(1, Math.ceil(allX.length / maxTicks));
            return allX.filter((_, i) => i % step === 0 || i === allX.length - 1);
          })())
          .tickFormat(d => {
            if (cfg.xFormat === "yyyymm") {
              const y = Math.floor(d);
              const m = Math.round((d - y) * 12) + 1;
              return y + "/" + String(m).padStart(2, "0");
            }
            return d === startX ? d : "'" + String(d).slice(-2);
          })
          .tickSize(6)
      );
    xAxisG.select(".domain").remove();

    // Y axis labels (text only, no axis line) on the left side of grid
    g.selectAll(".ydi-y-label")
      .data(yScale.ticks(5))
      .join("text")
      .attr("class", "ydi-y-label")
      .attr("x", -5)
      .attr("y", d => yScale(d))
      .attr("dy", "0.35em")
      .attr("text-anchor", "end")
      .attr("fill", "#888")
      .attr("font-size", 11)
      .text(d => yFmt(d));

    // --- Divider line at drawStartX ---
    g.append("line")
      .attr("class", "ydi-divider")
      .attr("x1", xScale(drawStartX))
      .attr("x2", xScale(drawStartX))
      .attr("y1", 0)
      .attr("y2", height);

    // --- Lines ---
    const line = d3.line()
      .x(d => xScale(d.x))
      .y(d => yScale(d.y));
    const sketchy = cfg.style === "sketchy";
    const toPoints = (arr) => arr.map(d => [xScale(d.x), yScale(d.y)]);

    // Known data (up to drawStartX)
    const knownData = data.filter(d => d.x <= drawStartX);
    if (sketchy) {
      const kPts = toPoints(knownData);
      g.append("path").attr("class", "ydi-known-line")
        .attr("d", sketchyLinePath(kPts)).attr("stroke", d3.sketchy.randomColor(cfg.colors.known, 0.03))
        .style("stroke-width", 3.5).style("opacity", 0.35);
      g.append("path").attr("class", "ydi-known-line")
        .attr("d", sketchyLinePath(kPts)).attr("stroke", d3.sketchy.randomColor(cfg.colors.known, 0.03))
        .style("stroke-width", 2).style("opacity", 0.85);
    } else {
      g.append("path").attr("class", "ydi-known-line").attr("d", line(knownData)).attr("stroke", cfg.colors.known);
    }

    // --- ClipPath for actual data ---
    const clipId = `ydi-clip-${cfg.id}`;
    const clipRect = svg.append("defs")
      .append("clipPath")
      .attr("id", clipId)
      .append("rect")
      .attr("x", 0)
      .attr("y", 0)
      .attr("width", xScale(drawStartX))
      .attr("height", height + margin.top + margin.bottom);

    this.clipRect = clipRect;

    // Actual data group (clipped)
    const actualG = g.append("g")
      .attr("clip-path", `url(#${clipId})`);

    const actualData = data.filter(d => d.x >= drawStartX);

    // Actual line (from drawStartX onward)
    if (sketchy) {
      const aPts = toPoints(actualData);
      actualG.append("path").attr("class", "ydi-actual-line")
        .attr("d", sketchyLinePath(aPts)).attr("stroke", d3.sketchy.randomColor(cfg.colors.actual, 0.03))
        .style("stroke-width", 3.5).style("opacity", 0.35);
      actualG.append("path").attr("class", "ydi-actual-line")
        .attr("d", sketchyLinePath(aPts)).attr("stroke", d3.sketchy.randomColor(cfg.colors.actual, 0.03))
        .style("stroke-width", 2).style("opacity", 0.85);
    } else {
      actualG.append("path").attr("class", "ydi-actual-line").attr("d", line(actualData)).attr("stroke", cfg.colors.actual);
    }

    // Actual endpoint
    const endPt = data[data.length - 1];
    if (sketchy) {
      drawSketchyCircle(actualG, xScale(endPt.x), yScale(endPt.y), 4, cfg.colors.actual);
    } else {
      actualG.append("circle").attr("cx", xScale(endPt.x)).attr("cy", yScale(endPt.y)).attr("r", 5).attr("fill", cfg.colors.actual);
    }

    // Actual end value label
    this.actualEndLabelEl = actualG.append("text")
      .attr("class", "ydi-value-label")
      .attr("x", xScale(endPt.x) + 10)
      .attr("y", yScale(endPt.y))
      .attr("dy", "0.35em")
      .attr("fill", cfg.colors.actual)
      .text(yFmt(endPt.y) + cfg.unit);

    // --- Start & mid point markers ---
    const startPt = data[0];
    if (sketchy) {
      drawSketchyCircle(g, xScale(startPt.x), yScale(startPt.y), 4, cfg.colors.known);
    } else {
      g.append("circle").attr("cx", xScale(startPt.x)).attr("cy", yScale(startPt.y)).attr("r", 5).attr("fill", cfg.colors.known);
    }

    g.append("text")
      .attr("class", "ydi-value-label")
      .attr("x", xScale(startPt.x))
      .attr("y", yScale(startPt.y) - 12)
      .attr("text-anchor", "middle")
      .attr("fill", cfg.colors.known)
      .text(yFmt(startPt.y) + cfg.unit);

    // Mid point (drawStartX)
    const midPt = data[drawStartIndex];
    if (sketchy) {
      drawSketchyCircle(g, xScale(midPt.x), yScale(midPt.y), 4, cfg.colors.known);
    } else {
      g.append("circle").attr("cx", xScale(midPt.x)).attr("cy", yScale(midPt.y)).attr("r", 5).attr("fill", cfg.colors.known);
    }

    const midLabelDy = drawStartIndex > 0 && midPt.y > data[drawStartIndex - 1].y ? -12 : 16;
    g.append("text")
      .attr("class", "ydi-value-label")
      .attr("x", xScale(midPt.x) - 8)
      .attr("y", yScale(midPt.y) + midLabelDy)
      .attr("text-anchor", "end")
      .attr("fill", cfg.colors.known)
      .text(yFmt(midPt.y) + cfg.unit);

    // --- User drawing data ---
    this.userData = data
      .filter(d => d.x >= drawStartX && d.x <= endX)
      .map(d => ({ x: d.x, y: d.y, userY: null, defined: false }));
    // First point is anchored
    this.userData[0].userY = midPt.y;
    this.userData[0].defined = true;

    // Flash rects (clipped to drawStartX onward)
    const drawClipId = `ydi-drawclip-${cfg.id}`;
    svg.select("defs").append("clipPath").attr("id", drawClipId)
      .append("rect")
      .attr("x", xScale(drawStartX))
      .attr("y", 0)
      .attr("width", xScale(endX) - xScale(drawStartX) + margin.right)
      .attr("height", height + margin.top + margin.bottom);

    const flashRects = g.append("g").attr("class", "ydi-flash-rects")
      .attr("clip-path", `url(#${drawClipId})`);
    const halfStep = (xScale(xStep) - xScale(0)) / 2;
    this.flashRectsSel = flashRects.selectAll("rect")
      .data(this.userData.slice(1))
      .join("rect")
      .attr("class", "ydi-flash-rect ydi-pending")
      .attr("x", d => xScale(d.x) - halfStep)
      .attr("y", 0)
      .attr("width", xScale(xStep) - xScale(0))
      .attr("height", height);

    // User line path
    this.userLineSel = g.append("path")
      .attr("class", "ydi-user-line")
      .attr("stroke", cfg.colors.user);

    // User endpoint circle
    this.userCircleSel = g.append("circle")
      .attr("class", "ydi-endpoint")
      .attr("r", 5)
      .attr("fill", cfg.colors.user)
      .attr("opacity", 0);

    // User value label
    this.userValueSel = g.append("text")
      .attr("class", "ydi-value-label")
      .attr("dy", "0.35em")
      .attr("fill", cfg.colors.user)
      .attr("opacity", 0);

    // --- Draw prompt ---
    const promptCenterX = (xScale(drawStartX + xStep) + xScale(endX)) / 2;
    const promptG = g.append("text")
      .attr("class", "ydi-draw-prompt")
      .attr("x", promptCenterX)
      .attr("y", height / 3);

    cfg.drawPrompt.forEach((line, i) => {
      promptG.append("tspan")
        .attr("x", promptCenterX)
        .attr("dy", i === 0 ? 0 : "1.4em")
        .text(line);
    });

    // --- Drag rect (invisible hit zone) ---
    const dragRect = g.append("rect")
      .attr("class", "ydi-drag-rect")
      .attr("x", xScale(drawStartX))
      .attr("y", 0)
      .attr("width", xScale(endX) - xScale(drawStartX))
      .attr("height", height);

    // --- Pointer event handling ---
    const self = this;
    this.dragRect = dragRect;
    this._bindPointerHandlers();

    // Store references
    this.yFmt = yFmt;
    this.xStep = xStep;
    this.endX = endX;
    this.drawStartX = drawStartX;
    this.actualEndValue = endPt.y;
    this.actualEndY = yScale(endPt.y);

    // Annotation labels (on top of all elements)
    annLabels.forEach(a => {
      g.append("text").attr("class", "ydi-annotation-label")
        .attr("x", a.x).attr("y", 12)
        .attr("text-anchor", "middle")
        .attr("fill", "#888").attr("font-size", 11)
        .text(a.label);
    });

    // --- ResizeObserver ---
    if (!this._resizeObserver) {
      this._resizeObserver = new ResizeObserver(() => {
        if (this.state === "revealed") return;
        // Debounce
        clearTimeout(this._resizeTimer);
        this._resizeTimer = setTimeout(() => {
          if (this.state !== "revealed") {
            this._render();
          }
        }, 200);
      });
      this._resizeObserver.observe(this.svgContainer);
    }
  }

  _handleDrag(event, el, rawMx, rawMy) {
    if (this.state === "revealed") return;

    const { xScale, yScale, cfg, userData, width, height } = this;
    let mx, my;
    if (rawMx !== undefined) { mx = rawMx; my = rawMy; }
    else { [mx, my] = d3.pointer(event, this.g.node()); }
    const xStep = this.xStep;
    const xVal = clamp(cfg.drawStartX + xStep * 0.5, this.endX + xStep * 0.5, xScale.invert(mx));
    const yVal = clamp(yScale.domain()[0], yScale.domain()[1], yScale.invert(my));

    // Find last defined point for interpolation
    let lastDefinedIdx = 0;
    for (let i = userData.length - 1; i >= 0; i--) {
      if (userData[i].defined) { lastDefinedIdx = i; break; }
    }

    // Set value and interpolate gaps
    userData.forEach((d, i) => {
      if (Math.abs(d.x - xVal) < xStep * 0.5) {
        d.userY = yVal;
        d.defined = true;

        // Interpolate between last defined and current
        const gap = i - lastDefinedIdx;
        if (gap > 1) {
          for (let j = 1; j < gap; j++) {
            const t = j / gap;
            userData[lastDefinedIdx + j].userY =
              userData[lastDefinedIdx].userY * (1 - t) + yVal * t;
            userData[lastDefinedIdx + j].defined = true;
          }
        }
      }
    });

    // Update state
    if (this.state === "idle") {
      this.state = "drawing";
      this.wrapEl.classList.add("ydi-drag-started");
    }

    // Update flash rects
    this.flashRectsSel.each(function(d) {
      if (d.defined) {
        d3.select(this).classed("ydi-pending", false).attr("fill-opacity", 0);
      }
    });

    // Update user line
    const userLine = d3.line()
      .defined(d => d.defined)
      .x(d => xScale(d.x))
      .y(d => yScale(d.userY));

    this.userLineSel.attr("d", userLine(userData));

    // Update endpoint
    const lastDefined = [...userData].reverse().find(d => d.defined);
    if (lastDefined && lastDefined.x > this.drawStartX) {
      this.userCircleSel
        .attr("cx", xScale(lastDefined.x))
        .attr("cy", yScale(lastDefined.userY))
        .attr("opacity", 1);

      const yFmt = this.yFmt;
      const displayVal = cfg.precision
        ? yFmt(parseFloat(lastDefined.userY.toFixed(cfg.precision)))
        : yFmt(lastDefined.userY);

      this.userValueSel
        .attr("x", xScale(lastDefined.x) + 10)
        .attr("y", yScale(lastDefined.userY))
        .attr("text-anchor", "start")
        .attr("opacity", 1)
        .text(displayVal + cfg.unit);
    }

    // Check if all points are defined
    if (userData.every(d => d.defined)) {
      if (this.state !== "ready") {
        this.state = "ready";
        this.wrapEl.classList.add("ydi-ready");
      }
    }
  }

  _bindPointerHandlers() {
    const self = this;
    const dragNode = this.dragRect.node();
    let active = false;

    function onPointer(e) {
      if (self.state === "revealed") return;
      e.preventDefault();
      const [mx, my] = d3.pointer(e, self.g.node());
      self._handleDrag(null, null, mx, my);
    }

    dragNode.addEventListener("pointerdown", function(e) {
      active = true;
      dragNode.setPointerCapture(e.pointerId);
      onPointer(e);
    }, { passive: false });

    dragNode.addEventListener("pointermove", function(e) {
      if (!active) return;
      onPointer(e);
    }, { passive: false });

    dragNode.addEventListener("pointerup", function() { active = false; });
    dragNode.addEventListener("pointercancel", function() { active = false; });
    dragNode.addEventListener("lostpointercapture", function() { active = false; });
  }

  _reveal() {
    if (this.state !== "ready") return;
    this.state = "revealed";
    this.wrapEl.classList.add("ydi-guessed");

    const { xScale, yScale, width, margin, cfg, userData } = this;

    // Animate clipPath
    this.clipRect
      .transition()
      .duration(1000)
      .ease(d3.easeLinear)
      .attr("width", width + margin.left + margin.right + 20);

    // Legend on the right side of the chart
    const legendX = width + 12;
    const legendY = this.height - 40;
    const legendG = this.g.append("g")
      .attr("class", "ydi-legend")
      .attr("transform", `translate(${legendX},${legendY})`);

    // User prediction legend
    legendG.append("line")
      .attr("x1", 0).attr("x2", 20)
      .attr("y1", 0).attr("y2", 0)
      .attr("stroke", cfg.colors.user)
      .attr("stroke-width", 3)
      .attr("stroke-dasharray", "1 7")
      .attr("stroke-linecap", "round");
    legendG.append("text")
      .attr("class", "ydi-legend-label")
      .attr("x", 26).attr("y", 0)
      .attr("dy", "0.35em")
      .attr("fill", cfg.colors.user)
      .text("あなたの予想");

    // Actual data legend
    legendG.append("line")
      .attr("x1", 0).attr("x2", 20)
      .attr("y1", 22).attr("y2", 22)
      .attr("stroke", cfg.colors.actual)
      .attr("stroke-width", 3)
      .attr("stroke-linecap", "round");
    legendG.append("text")
      .attr("class", "ydi-legend-label")
      .attr("x", 26).attr("y", 22)
      .attr("dy", "0.35em")
      .attr("fill", cfg.colors.actual)
      .text("実際のデータ");

    // Resolve label overlaps (value labels + legend)
    const userEndY = yScale(userData[userData.length - 1].userY);
    const actualEndY = this.actualEndY;
    const labelItems = [
      { y: actualEndY, height: 14, el: this.actualEndLabelEl, id: "actual" },
      { y: userEndY, height: 14, el: this.userValueSel, id: "user" },
      { y: this.height - 40, height: 40, legendG, legendX, id: "legend" },
    ];
    resolveVerticalOverlaps(labelItems, 4);
    this.userValueSel.transition().duration(300).attr("y", labelItems.find(i => i.id === "user").y);

    // Calculate score
    const scores = userData.slice(1).map(d => d.userY / d.y);
    const totalError = d3.sum(scores, s => Math.abs(1 - s));
    const avgRatio = d3.mean(scores);

    let label, cls;
    if (totalError < 0.5) {
      label = "ほぼ正解！";
      cls = "ydi-score-good";
    } else if (totalError < 2) {
      label = "惜しい！";
      cls = "ydi-score-ok";
    } else {
      label = avgRatio < 0.7 ? "控えめな予想でした" : avgRatio > 1.3 ? "攻めた予想でした" : "ずれていますね";
      cls = "ydi-score-off";
    }

    // Build download data
    const exportData = userData.map(d => ({
      x: d.x,
      actual: d.y,
      prediction: cfg.precision ? parseFloat(d.userY.toFixed(cfg.precision)) : Math.round(d.userY),
    }));

    const afterEl = this.wrapEl.querySelector(".ydi-after-reveal");
    const scoreHTML = `<div class="ydi-score ${cls}">${label}</div>`;
    const downloadHTML = `<div class="ydi-download-area">
      <button class="ydi-download-btn" data-fmt="csv">CSV</button>
      <button class="ydi-download-btn" data-fmt="json">JSON</button>
    </div>`;
    afterEl.innerHTML = scoreHTML
      + (cfg.afterRevealHTML ? `<p style="margin-top:8px">${cfg.afterRevealHTML}</p>` : "")
      + downloadHTML;

    // Download handlers
    afterEl.querySelectorAll(".ydi-download-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const fmt = btn.dataset.fmt;
        let content, mime, ext;
        if (fmt === "csv") {
          const header = "x,actual,prediction";
          const rows = exportData.map(d => `${d.x},${d.actual},${d.prediction}`);
          content = [header, ...rows].join("\n");
          mime = "text/csv";
          ext = "csv";
        } else {
          content = JSON.stringify(exportData, null, 2);
          mime = "application/json";
          ext = "json";
        }
        const blob = new Blob([content], { type: mime });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${cfg.id}-prediction.${ext}`;
        a.click();
        URL.revokeObjectURL(a.href);
      });
    });

    // Dispatch event
    this.wrapEl.dispatchEvent(new CustomEvent("you-draw-it:revealed", {
      bubbles: true,
      detail: { id: cfg.id, totalError, avgRatio, label },
    }));
  }
}

// --------------- サムネイル生成 ---------------
async function generateThumbnail() {
  const svgEl = document.querySelector(".ydi-chart-wrap svg");
  if (!svgEl) return null;
  try {
    const clone = svgEl.cloneNode(true);
    clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");

    // 計算済みスタイルをインライン化（SVG→Canvas変換時にCSSクラスが効かないため）
    const inlineStyles = (srcEl, cloneEl) => {
      const computed = window.getComputedStyle(srcEl);
      const important = ["fill", "stroke", "stroke-width", "stroke-dasharray", "stroke-linecap",
        "stroke-linejoin", "opacity", "fill-opacity", "stroke-opacity", "font-family", "font-size",
        "font-weight", "text-anchor", "display", "visibility"];
      important.forEach(prop => {
        const val = computed.getPropertyValue(prop);
        if (val) cloneEl.style.setProperty(prop, val);
      });
      const srcChildren = srcEl.children;
      const cloneChildren = cloneEl.children;
      for (let i = 0; i < srcChildren.length; i++) {
        if (cloneChildren[i]) inlineStyles(srcChildren[i], cloneChildren[i]);
      }
    };
    inlineStyles(svgEl, clone);

    // 不要な要素を除去（点滅エリア、ドラッグ領域、プロンプト）
    clone.querySelectorAll(".ydi-flash-rect, .ydi-drag-rect, .ydi-draw-prompt").forEach(el => el.remove());

    const svgData = new XMLSerializer().serializeToString(clone);
    const canvas = document.createElement("canvas");
    const svgW = parseFloat(svgEl.getAttribute("width")) || 640;
    const svgH = parseFloat(svgEl.getAttribute("height")) || 400;
    canvas.width = svgW * 2;
    canvas.height = svgH * 2;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const img = new Image();
    const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = reject;
      img.src = url;
    });
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    return canvas.toDataURL("image/png");
  } catch (e) {
    console.warn("Thumbnail generation failed:", e);
    return null;
  }
}

    const check = setInterval(() => {
      if (window.datavizSupabase) { clearInterval(check); resolve(); }
    }, 200);
    setTimeout(() => { clearInterval(check); resolve(); }, 5000);
  });

  await waitForAuth();
  const token = await getAccessToken();
  if (!token) return;

  try {
    const res = await fetch(`${API_BASE}/api/projects/${projectId}`, {
      headers: { "Authorization": `Bearer ${token}` },

    if (data.charts && Array.isArray(data.charts)) {

/// 時系列列判定: 年(4桁)、年月(6桁YYYYMM)、日付文字列を含む列
function isTimeSeriesCol(rows, col) {
  const sample = rows.slice(0, Math.min(10, rows.length));
  return sample.filter(r => {
    const v = String(r[col]).trim();
    return /^\d{4}$/.test(v) || /^\d{6}$/.test(v) || /\d{4}[-\/]/.test(v);
  }).length > sample.length * 0.5;
}

// YYYYMM → 小数年に変換（例: 201003 → 2010.167）
function parseTimeValue(raw) {
  const s = String(raw).trim();
  // YYYYMM (6桁数値)
  if (/^\d{6}$/.test(s)) {
    const y = parseInt(s.slice(0, 4));
    const m = parseInt(s.slice(4, 6));
    return y + (m - 1) / 12;
  }
  // YYYY/MM or YYYY-MM
  const ymMatch = s.match(/^(\d{4})[\/\-](\d{1,2})$/);
  if (ymMatch) {
    return parseInt(ymMatch[1]) + (parseInt(ymMatch[2]) - 1) / 12;
  }
  // YYYY/MM/DD or YYYY-MM-DD → 年月に変換
  const ymdMatch = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-]\d{1,2}$/);
  if (ymdMatch) {
    return parseInt(ymdMatch[1]) + (parseInt(ymdMatch[2]) - 1) / 12;
  }
  let x = parseFloat(s);
  if (isNaN(x)) {
    const dateMatch = s.match(/(\d{4})/);
    if (dateMatch) x = parseInt(dateMatch[1]);
  }
  return x;
}

// 小数年をラベルに変換（ドロップダウン表示用）
function formatXForDropdown(val) {
  if (currentXFormat === "yyyymm") {
    const y = Math.floor(val);
    const m = Math.round((val - y) * 12) + 1;
    return y + "/" + String(m).padStart(2, "0");
  }
  return String(val);
}

// X軸のフォーマッタを決定（YYYYMM形式か年のみか）
function detectXFormat(rows, col) {
  const sample = rows.slice(0, Math.min(10, rows.length));
  const hasMonthly = sample.filter(r => {
    const v = String(r[col]).trim();
    return /^\d{6}$/.test(v) || /^\d{4}[\/\-]\d{1,2}$/.test(v) || /^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}$/.test(v);
  }).length > sample.length * 0.5;
  return hasMonthly ? "yyyymm" : "year";
}
// 数値列判定: 大半の行が数値に変換できる列
function isNumericCol(rows, col) {
  const sample = rows.slice(0, Math.min(10, rows.length));
  return sample.filter(r => !isNaN(parseFloat(String(r[col]).replace(/,/g, "")))).length > sample.length * 0.5;
}

// 選択中の列でデータをパースし直す
function parseWithColumns(xColName, yColName) {
  if (!csvRawRows) return;
  currentXFormat = detectXFormat(csvRawRows, xColName);
  const parsed = csvRawRows.map(d => {
    const rawX = d[xColName];
    const rawY = d[yColName];
    const x = parseTimeValue(rawX);
    const y = parseFloat(String(rawY).replace(/,/g, ""));
    return { x, y };
  }).filter(d => !isNaN(d.x) && !isNaN(d.y));

  if (parsed.length < 2) {
    showMessage("有効なデータが2行未満です。列の選択を確認してください。", "error");
    return;
  }
  const dupX = parsed.map(d => d.x).filter((v, i, a) => a.indexOf(v) !== i);
  if (dupX.length > 0) {
    showMessage("X軸に重複があります。データを整理してください。", "error");
    return;
  }
  parsed.sort((a, b) => a.x - b.x);
  uploadedData = parsed;
  onDataLoaded();
}

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    try {
      let parsed;
      if (file.name.endsWith(".json")) {
        parsed = JSON.parse(text);
        if (!Array.isArray(parsed)) throw new Error("JSONは配列形式にしてください");
        csvRawRows = null;
        csvCols = null;
        document.getElementById("col-select-row").style.display = "none";
      } else {
        const rows = d3.csvParse(text);
        const cols = Object.keys(rows[0] || {});
        if (cols.length < 2) throw new Error("2列以上のCSVが必要です");

        csvRawRows = rows;
        csvCols = cols;

        // 自動検出
        const autoX = cols.find(c => isTimeSeriesCol(rows, c));
        const autoY = cols.find(c => c !== autoX && isNumericCol(rows, c));
        if (!autoX || !autoY) throw new Error("時系列列と数値列が見つかりません");

        // ドロップダウンを設定（Y軸は数値列のみ）
        const colXSel = document.getElementById("col-x");
        const colYSel = document.getElementById("col-y");
        const numericCols = cols.filter(c => isNumericCol(rows, c));
        colXSel.innerHTML = cols.map(c => `<option value="${c}"${c === autoX ? " selected" : ""}>${c}</option>`).join("");
        colYSel.innerHTML = numericCols.map(c => `<option value="${c}"${c === autoY ? " selected" : ""}>${c}</option>`).join("");
        document.getElementById("col-select-row").style.display = "";

        currentXFormat = detectXFormat(rows, autoX);
        parsed = rows.map(d => {
          const rawX = d[autoX];
          const rawY = d[autoY];
          const x = parseTimeValue(rawX);
          const y = parseFloat(String(rawY).replace(/,/g, ""));
          return { x, y };
        });
      }
      // Validate
      parsed = parsed.filter(d => !isNaN(d.x) && !isNaN(d.y));
      if (parsed.length < 2) throw new Error("2点以上のデータが必要です");
      const dupX = parsed.map(d => d.x).filter((v, i, a) => a.indexOf(v) !== i);
      if (dupX.length > 0) {
        throw new Error("X軸に重複があります。データを整理してください。");
      }
      parsed.sort((a, b) => a.x - b.x);

      uploadedData = parsed;
      onDataLoaded();
    } catch (err) {
      showMessage("データの読み込みに失敗: " + err.message, "error");
    }
  };
  reader.readAsText(file);
}

// 列選択ドロップダウンの変更イベント
document.getElementById("col-x").addEventListener("change", () => {
  parseWithColumns(document.getElementById("col-x").value, document.getElementById("col-y").value);
});
document.getElementById("col-y").addEventListener("change", () => {
  parseWithColumns(document.getElementById("col-x").value, document.getElementById("col-y").value);
});

function onDataLoaded() {
  // Update dropzone
  dropzone.classList.add("loaded");
  dropzone.querySelector("p").textContent = `${uploadedData.length}件のデータを読み込みました`;

  // Show data preview tables (2 columns aligned with dropdowns)
  const colXLabel = document.getElementById("col-x").value || "x";
  const colYLabel = document.getElementById("col-y").value || "y";
  let htmlX = `<table><thead><tr><th>${colXLabel}</th></tr></thead><tbody>`;
  let htmlY = `<table><thead><tr><th>${colYLabel}</th></tr></thead><tbody>`;
  if (csvRawRows && csvCols) {
    csvRawRows.forEach(row => {
      htmlX += `<tr><td>${row[colXLabel] || ""}</td></tr>`;
      htmlY += `<tr><td>${row[colYLabel] || ""}</td></tr>`;
    });
  } else {
    uploadedData.forEach(d => {
      htmlX += `<tr><td>${d.x}</td></tr>`;
      htmlY += `<tr><td>${d.y}</td></tr>`;
    });
  }
  htmlX += "</tbody></table>";
  htmlY += "</tbody></table>";
  document.getElementById("data-preview-x").innerHTML = htmlX;
  document.getElementById("data-preview-y").innerHTML = htmlY;
  dataPreview.style.display = "";

  // Populate period select dropdowns
  const periodStartSel = document.getElementById("period-start");
  const periodEndSel = document.getElementById("period-end");
  const allXValues = uploadedData.map(d => d.x);
  periodStartSel.innerHTML = allXValues.map(x => `<option value="${x}">${formatXForDropdown(x)}</option>`).join("");
  periodEndSel.innerHTML = allXValues.map(x => `<option value="${x}">${formatXForDropdown(x)}</option>`).join("");
  periodStartSel.value = allXValues[0];
  periodEndSel.value = allXValues[allXValues.length - 1];
  periodStartSel.disabled = false;
  periodEndSel.disabled = false;
  document.getElementById("period-select-row").style.display = "";

  populateDrawStart();
  updatePreview();

  // アコーディオン自動遷移: ステップ1を閉じて2,3を開く
  closeStep(1);
  openStep(2);
  openStep(3);
}

// 対象期間に応じたデータをフィルタして返す
function getFilteredData() {
  if (!uploadedData) return null;
  const startVal = parseFloat(document.getElementById("period-start").value);
  const endVal = parseFloat(document.getElementById("period-end").value);
  if (isNaN(startVal) || isNaN(endVal)) return uploadedData;
  return uploadedData.filter(d => d.x >= startVal && d.x <= endVal);
}

// 対象期間が変わったらdrawStartXのドロップダウンを再設定
function populateDrawStart() {
  const filtered = getFilteredData();
  if (!filtered || filtered.length < 2) return;
  drawStartSelect.innerHTML = "";
  drawStartSelect.disabled = false;
  const xValues = filtered.map(d => d.x);
  const midIdx = Math.floor(xValues.length / 2);
  xValues.forEach((x, i) => {
    if (i === 0 || i === xValues.length - 1) return;
    const opt = document.createElement("option");
    opt.value = x;
    opt.textContent = formatXForDropdown(x);
    if (i === midIdx) opt.selected = true;
    drawStartSelect.appendChild(opt);
  });
}

document.getElementById("period-start").addEventListener("change", () => { populateDrawStart(); updatePreview(); });
document.getElementById("period-end").addEventListener("change", () => { populateDrawStart(); updatePreview(); });

// --------------- フォーム: プレビュー更新 ---------------
let previewDebounce = null;

function updatePreview() {
  if (!uploadedData) return;
  clearTimeout(previewDebounce);
  previewDebounce = setTimeout(() => {
    const cfg = buildConfig();
    if (!cfg) return;

    const placeholder = document.getElementById("preview-placeholder");
    if (placeholder) placeholder.style.display = "none";
    previewSection.style.display = "block";
    previewContainer.innerHTML = "";
    // Remove existing chart wraps from preview
    previewContainer.querySelectorAll(".ydi-chart-wrap").forEach(el => el.remove());

    currentConfigs = [cfg];
    new ChartInstance(previewContainer, cfg);
  }, 200);
}

function buildConfig() {
  const filtered = getFilteredData();
  if (!filtered || filtered.length < 3) return null;
  const drawStartX = parseFloat(drawStartSelect.value);
  if (isNaN(drawStartX)) return null;

  const styleVal = document.getElementById("quiz-style").value;
  const annotations = [];
  document.querySelectorAll(".ydi-annotation-row").forEach(row => {
    const startX = parseFloat(row.querySelector(".ann-start").value);
    const endX = parseFloat(row.querySelector(".ann-end").value);
    const label = row.querySelector(".ann-label").value.trim();
    if (!isNaN(startX) && !isNaN(endX)) {
      annotations.push({ startX, endX, label: label || "" });
    }
  });
  return {
    id: "preview",
    title: titleInput.value || "タイトル未設定",
    data: filtered,
    drawStartX: drawStartX,
    unit: unitInput.value || "",
    style: styleVal || undefined,
    xFormat: currentXFormat !== "year" ? currentXFormat : undefined,
    annotations: annotations.length > 0 ? annotations : undefined,
    yFormat: ",.0f",
    precision: 0,
    yExtent: 1.5,
    buttonText: "答え合わせ",
    drawPrompt: ["線を描いて", "予想してみよう"],
  };
}

// Form change listeners
drawStartSelect.addEventListener("change", updatePreview);
titleInput.addEventListener("input", updatePreview);
unitInput.addEventListener("input", updatePreview);
document.getElementById("quiz-style").addEventListener("change", updatePreview);

// Annotation add/remove
function addAnnotationRow(startX, endX, label) {
  const filtered = getFilteredData();
  if (!filtered || filtered.length === 0) return;
  const xValues = filtered.map(d => d.x);
  const options = xValues.map(x => `<option value="${x}"${x === startX ? " selected" : ""}>${formatXForDropdown(x)}</option>`).join("");
  const optionsEnd = xValues.map(x => `<option value="${x}"${x === endX ? " selected" : ""}>${formatXForDropdown(x)}</option>`).join("");
  const list = document.getElementById("annotations-list");
  const row = document.createElement("div");
  row.className = "ydi-field-row ydi-annotation-row";
  row.innerHTML = `
    <div><label>開始</label><select class="ann-start">${options}</select></div>
    <div><label>終了</label><select class="ann-end">${optionsEnd}</select></div>
    <div><label>ラベル</label><input type="text" class="ann-label" placeholder="例: オバマ政権" value="${label || ""}"></div>
    <div class="ann-remove-wrap"><label>&nbsp;</label><button type="button" class="ann-remove">&times;</button></div>
  `;
  row.querySelectorAll("select, input").forEach(el => el.addEventListener("change", updatePreview));
  row.querySelector(".ann-label").addEventListener("input", updatePreview);
  list.appendChild(row);
  updatePreview();
}
document.getElementById("add-annotation").addEventListener("click", () => addAnnotationRow());
document.getElementById("annotations-list").addEventListener("click", (e) => {
  if (e.target.classList.contains("ann-remove")) {
    e.target.closest(".ydi-annotation-row").remove();
    updatePreview();
  }
});

// --------------- アコーディオン制御 ---------------
function openStep(n) {
  const step = document.querySelector(`.ydi-accordion-step[data-step="${n}"]`);
  if (step) step.classList.add("open");
}
function closeStep(n) {
  const step = document.querySelector(`.ydi-accordion-step[data-step="${n}"]`);
  if (step) step.classList.remove("open");
}
document.querySelectorAll(".ydi-step-header").forEach(header => {
  header.addEventListener("click", () => {
    header.closest(".ydi-accordion-step").classList.toggle("open");
  });
});

// --------------- 初期化 ---------------
// No default charts — user uploads data

// ツールヘッダーはdeferで遅延読込されるため、DOMContentLoadedで設定
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", setupToolHeader);
} else {
  setTimeout(setupToolHeader, 100);
}

// URL自動読込（プロジェクト読込時はフォームを復元）
autoLoadFromURL();
</script>
