<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  color: #333;
  background: #fff;
  line-height: 1.6;
}

.you-draw-it {
  max-width: 640px;
  margin: 0 auto;
  padding: 124px 16px 20px;
}

.you-draw-it h1 {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 8px;
  text-align: center;
}

.you-draw-it .intro {
  text-align: center;
  color: #666;
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* --- Individual chart --- */
.ydi-chart-wrap {
  margin-bottom: 48px;
  position: relative;
}

.ydi-chart-wrap h2 {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 12px;
  line-height: 1.4;
  text-align: center;
}

.ydi-chart-wrap svg {
  display: block;
  margin: 0 auto;
  overflow: visible;
  font: 300 13px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* Grid */
.ydi-grid line {
  stroke: #e0e0e0;
  stroke-width: 1;
  shape-rendering: crispEdges;
}

/* Axes */
.ydi-chart-wrap .axis path,
.ydi-chart-wrap .axis line {
  stroke: #ccc;
  shape-rendering: crispEdges;
}
.ydi-chart-wrap .axis text {
  fill: #888;
  font-size: 12px;
}

/* Lines */
.ydi-known-line {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.ydi-actual-line {
  fill: none;
  stroke-width: 3;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.ydi-area {
  opacity: 0.12;
}
.ydi-user-line {
  fill: none;
  stroke-width: 3;
  stroke-dasharray: 1 7;
  stroke-linecap: round;
}

/* Drag rect */
.ydi-drag-rect {
  fill-opacity: 0;
  cursor: pointer;
}

/* Flash rects */
.ydi-flash-rect {
  fill: rgba(255, 200, 0, 0.7);
  fill-opacity: 0;
}
.ydi-flash-rect.ydi-pending {
  animation: ydi-flash 0.6s ease-in-out alternate infinite;
}

@keyframes ydi-flash {
  from { fill-opacity: 0; }
  to   { fill-opacity: 0.5; }
}

/* Value labels */
.ydi-value-label {
  font-size: 13px;
  font-weight: 700;
}

/* Draw prompt */
.ydi-draw-prompt {
  font-size: 15px;
  font-weight: 600;
  fill: #999;
  text-anchor: middle;
  pointer-events: none;
  transition: opacity 0.3s;
}

/* Endpoint circles */
.ydi-endpoint {
  transition: opacity 0.3s;
}

/* --- State: drag started --- */
.ydi-drag-started .ydi-draw-prompt {
  opacity: 0;
}
.ydi-drag-started .ydi-flash-rect.ydi-pending {
  animation: ydi-flash 0.4s ease-in-out alternate infinite;
}

/* --- Button --- */
.ydi-button-area {
  text-align: center;
  margin-top: 12px;
  transition: opacity 0.3s;
}
.ydi-button {
  display: inline-block;
  padding: 10px 28px;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  background: #333;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  opacity: 0.25;
  pointer-events: none;
  transition: opacity 0.3s, background 0.2s;
}
.ydi-ready .ydi-button {
  opacity: 1;
  pointer-events: auto;
}
.ydi-publish-btn {
  opacity: 1 !important;
  pointer-events: auto !important;
}
.ydi-button:hover {
  background: #555;
}

/* --- After reveal --- */
.ydi-after-reveal {
  text-align: center;
  margin-top: 12px;
  font-size: 0.95rem;
  color: #555;
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  transition: opacity 0.5s 0.6s, max-height 0.5s 0.6s;
}
.ydi-guessed .ydi-button-area {
  opacity: 0;
  pointer-events: none;
}
.ydi-guessed .ydi-after-reveal {
  opacity: 1;
  max-height: 300px;
}
.ydi-guessed .ydi-drag-rect {
  pointer-events: none;
}

/* Score badge */
.ydi-score {
  display: inline-block;
  margin-top: 4px;
  padding: 4px 14px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.9rem;
}
.ydi-score-good { background: #d4edda; color: #155724; }
.ydi-score-ok   { background: #fff3cd; color: #856404; }
.ydi-score-off  { background: #f8d7da; color: #721c24; }

/* Download buttons */
.ydi-download-area {
  margin-top: 10px;
}
.ydi-download-btn {
  display: inline-block;
  padding: 5px 14px;
  margin: 0 4px;
  font-size: 13px;
  font-weight: 600;
  color: #555;
  background: #f0f0f0;
  border: 1px solid #ddd;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.2s;
  text-decoration: none;
}
.ydi-download-btn:hover {
  background: #e0e0e0;
}

/* --- Divider line between known and draw area --- */
.ydi-divider {
  stroke: #ccc;
  stroke-width: 1;
  stroke-dasharray: 4 3;
  shape-rendering: crispEdges;
}

/* --- Legend (shown after reveal) --- */
.ydi-legend {
  opacity: 0;
  transition: opacity 0.5s 0.8s;
}
.ydi-guessed .ydi-legend {
  opacity: 1;
}
.ydi-legend-label {
  font-size: 12px;
  font-weight: 600;
}

/* --- Load modal --- */
.ydi-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 10000;
  justify-content: center;
  align-items: center;
}
.ydi-modal-overlay.active {
  display: flex;
}
.ydi-modal {
  background: #fff;
  border-radius: 8px;
  width: 90%;
  max-width: 480px;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.ydi-modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid #eee;
}
.ydi-modal-header h3 {
  margin: 0;
  font-size: 1rem;
}
.ydi-modal-close {
  background: none;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  color: #888;
  padding: 0 4px;
}
.ydi-modal-close:hover { color: #333; }
.ydi-modal-body {
  overflow-y: auto;
  padding: 12px 20px;
}
.ydi-modal-body .ydi-empty {
  text-align: center;
  color: #999;
  padding: 32px 0;
}
.ydi-project-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
  cursor: pointer;
  transition: background 0.15s;
}
.ydi-project-item:hover {
  background: #f8f8f8;
  margin: 0 -20px;
  padding: 10px 20px;
}
.ydi-project-item:last-child { border-bottom: none; }
.ydi-project-name {
  font-weight: 600;
  font-size: 0.95rem;
}
.ydi-project-date {
  font-size: 0.8rem;
  color: #999;
}

/* --- Save name dialog --- */
.ydi-save-dialog {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 10000;
  justify-content: center;
  align-items: center;
}
.ydi-save-dialog.active { display: flex; }
.ydi-save-dialog-inner {
  background: #fff;
  border-radius: 8px;
  padding: 24px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.ydi-save-dialog-inner h3 {
  margin: 0 0 12px;
  font-size: 1rem;
}
.ydi-save-dialog-inner input {
  width: 100%;
  padding: 8px 12px;
  font-size: 0.95rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  margin-bottom: 16px;
}
.ydi-save-dialog-inner input:focus {
  outline: none;
  border-color: #333;
}
.ydi-save-dialog-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.ydi-save-dialog-actions button {
  padding: 8px 20px;
  font-size: 0.9rem;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid #ccc;
  background: #f0f0f0;
}
.ydi-save-dialog-actions button.primary {
  background: #333;
  color: #fff;
  border-color: #333;
}
.ydi-save-dialog-actions button.primary:hover { background: #555; }

/* --- Quiz creation form --- */
.ydi-create {
  margin-bottom: 32px;
  padding: 20px;
  background: #fafafa;
  border: 1px solid #eee;
  border-radius: 8px;
}
.ydi-create h2 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 16px;
}
.ydi-create label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: #555;
  margin-bottom: 4px;
}
.ydi-create input[type="text"],
.ydi-create select {
  width: 100%;
  padding: 8px 12px;
  font-size: 0.95rem;
  border: 1px solid #ccc;
  border-radius: 4px;
  margin-bottom: 14px;
}
.ydi-create input:focus,
.ydi-create select:focus {
  outline: none;
  border-color: #333;
}
.ydi-create .ydi-field-row {
  display: flex;
  gap: 12px;
}
.ydi-create .ydi-field-row > div {
  flex: 1;
}

/* Drop zone */
.ydi-dropzone {
  border: 2px dashed #ccc;
  border-radius: 8px;
  padding: 24px 16px;
  text-align: center;
  color: #999;
  font-size: 0.9rem;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 14px;
}
.ydi-dropzone:hover,
.ydi-dropzone.dragover {
  border-color: #666;
  background: #f0f0f0;
}
.ydi-dropzone.loaded {
  border-color: #4caf50;
  background: #e8f5e9;
  color: #2e7d32;
}
.ydi-dropzone input[type="file"] {
  display: none;
}
.ydi-data-preview {
  max-height: 150px;
  overflow-y: auto;
  font-size: 0.8rem;
  margin-bottom: 14px;
  border: 1px solid #eee;
  border-radius: 4px;
}
.ydi-data-preview table {
  width: 100%;
  border-collapse: collapse;
}
.ydi-data-preview th,
.ydi-data-preview td {
  padding: 4px 8px;
  text-align: right;
  border-bottom: 1px solid #f0f0f0;
}
.ydi-data-preview th {
  background: #f8f8f8;
  font-weight: 600;
  position: sticky;
  top: 0;
}
.ydi-preview-section {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid #eee;
}
.ydi-preview-section h3 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 8px;
  color: #666;
}

/* --- Responsive --- */
@media (max-width: 600px) {
  .you-draw-it { padding: 108px 8px 12px; }
  .you-draw-it h1 { font-size: 1.3rem; }
  .ydi-chart-wrap h2 { font-size: 1rem; }
  .ydi-draw-prompt { font-size: 13px; }
  .ydi-value-label { font-size: 11px; }
}
</style>

<body>

<dataviz-tool-header></dataviz-tool-header>

<div class="you-draw-it" id="app">
  <h1>描いて答える折れ線グラフ</h1>
  <p class="intro">データをアップロードして、クイズを作成しよう。</p>

  <!-- クイズ作成フォーム -->
  <div class="ydi-create" id="create-form">
    <h2>1. データをアップロード</h2>
    <div class="ydi-dropzone" id="dropzone">
      <p>CSVファイルをドラッグ＆ドロップ、またはクリックして選択</p>
      <p style="font-size:0.8rem;margin-top:4px">形式: x,y（1行目はヘッダー）</p>
      <input type="file" id="file-input" accept=".csv,.json">
    </div>
    <div class="ydi-data-preview" id="data-preview" style="display:none"></div>

    <h2>2. クイズの設定</h2>
    <label for="quiz-title">タイトル（質問文）</label>
    <input type="text" id="quiz-title" placeholder="例: 日本の人口はどう推移した？">

    <div class="ydi-field-row">
      <div>
        <label for="quiz-draw-start">ここから予測（出題範囲の開始）</label>
        <select id="quiz-draw-start" disabled>
          <option value="">データを先にアップロード</option>
        </select>
      </div>
      <div>
        <label for="quiz-unit">単位（任意）</label>
        <input type="text" id="quiz-unit" placeholder="例: %, 万人, $">
      </div>
    </div>

    <div class="ydi-preview-section" id="preview-section" style="display:none">
      <h3>プレビュー</h3>
      <div id="preview-container"></div>
    </div>
  </div>
</div>

<!-- 読込モーダル -->
<div class="ydi-modal-overlay" id="load-modal">
  <div class="ydi-modal">
    <div class="ydi-modal-header">
      <h3>プロジェクトを読み込む</h3>
      <button class="ydi-modal-close" id="load-modal-close">&times;</button>
    </div>
    <div class="ydi-modal-body" id="load-modal-body">
      <p class="ydi-empty">読み込み中...</p>
    </div>
  </div>
</div>

<!-- 公開URLダイアログ -->
<div class="ydi-save-dialog" id="publish-dialog">
  <div class="ydi-save-dialog-inner">
    <h3>クイズを公開しました</h3>
    <p style="font-size:0.9rem;color:#666;margin-bottom:12px">以下のURLを共有すると、誰でもクイズに回答できます。</p>
    <input type="text" id="publish-url-input" readonly style="background:#f8f8f8;cursor:text">
    <div class="ydi-save-dialog-actions">
      <button id="publish-close">閉じる</button>
      <button class="primary" id="publish-copy">URLをコピー</button>
    </div>
  </div>
</div>

<!-- 保存名入力ダイアログ -->
<div class="ydi-save-dialog" id="save-dialog">
  <div class="ydi-save-dialog-inner">
    <h3>プロジェクト名</h3>
    <input type="text" id="save-name-input" placeholder="プロジェクト名を入力">
    <div class="ydi-save-dialog-actions">
      <button id="save-cancel">キャンセル</button>
      <button class="primary" id="save-confirm">保存</button>
    </div>
  </div>
</div>

<script type="module">
// ============================================================
//  YouDrawIt — 描いて答える折れ線グラフ テンプレート
// ============================================================

// --------------- アップロードデータ管理 ---------------
let uploadedData = null; // [{x, y}, ...]

// --------------- デフォルト設定 ---------------
const DEFAULTS = {
  unit: "",
  yFormat: ",.0f",
  precision: 0,
  yExtent: 1.5,
  height: 300,
  margin: { top: 20, right: 110, bottom: 40, left: 15 },
  colors: { known: "#e41a1c", actual: "#4286bc", user: "#ffc700" },
  buttonText: "答え合わせ",
  drawPrompt: ["線を描いて", "予測してみよう"],
  afterRevealHTML: "",
};

// --------------- ユーティリティ ---------------
function clamp(min, max, val) {
  return Math.max(min, Math.min(max, val));
}

function mergeConfig(cfg) {
  return {
    ...DEFAULTS,
    ...cfg,
    margin: { ...DEFAULTS.margin, ...(cfg.margin || {}) },
    colors: { ...DEFAULTS.colors, ...(cfg.colors || {}) },
  };
}

// --------------- ChartInstance ---------------
class ChartInstance {
  constructor(parentEl, rawConfig) {
    this.cfg = mergeConfig(rawConfig);
    this.state = "idle"; // idle | drawing | ready | revealed
    this.parentEl = parentEl;

    this._buildDOM();
    this._render();
  }

  _buildDOM() {
    const { cfg } = this;
    const wrap = document.createElement("div");
    wrap.className = "ydi-chart-wrap";
    wrap.id = `ydi-${cfg.id}`;

    wrap.innerHTML = `
      <h2>${cfg.title}</h2>
      <div class="ydi-svg-container"></div>
      <div class="ydi-button-area">
        <button class="ydi-button ydi-publish-btn">公開</button>
      </div>
      <div class="ydi-after-reveal">${cfg.afterRevealHTML}</div>
    `;

    this.parentEl.appendChild(wrap);
    this.wrapEl = wrap;
    this.svgContainer = wrap.querySelector(".ydi-svg-container");
    this.buttonEl = wrap.querySelector(".ydi-button");
    this.buttonEl.addEventListener("click", () => publishQuiz());
  }

  _render() {
    const { cfg } = this;
    const isMobile = window.innerWidth < 600;

    // Clear previous SVG (for resize)
    this.svgContainer.innerHTML = "";

    const totalWidth = this.svgContainer.offsetWidth || 560;
    const margin = { ...cfg.margin };
    if (isMobile) {
      margin.right = 55;
      margin.left = 10;
    }
    const width = totalWidth - margin.left - margin.right;
    const height = cfg.height;

    // Data indices
    const data = cfg.data;
    const startX = data[0].x;
    const endX = data[data.length - 1].x;
    const drawStartX = cfg.drawStartX;
    const drawStartIndex = data.findIndex(d => d.x >= drawStartX);
    const xStep = data.length > 1 ? data[1].x - data[0].x : 1;

    // Scales
    const xScale = d3.scaleLinear()
      .domain([startX, endX])
      .range([0, width]);

    const yMin = d3.min(data, d => d.y);
    const yMax = d3.max(data, d => d.y);
    const yPad = (yMax - yMin) * (cfg.yExtent - 1) || 1;
    const yDomainMin = yMin >= 0 ? 0 : yMin - yPad;
    const yDomainMax = yMax + yPad;
    const yScale = d3.scaleLinear()
      .domain([yDomainMin, yDomainMax])
      .nice()
      .range([height, 0]);

    // SVG
    const svg = d3.select(this.svgContainer)
      .append("svg")
      .attr("width", totalWidth)
      .attr("height", height + margin.top + margin.bottom);

    const g = svg.append("g")
      .attr("transform", `translate(${margin.left},${margin.top})`);

    this.svg = svg;
    this.g = g;
    this.xScale = xScale;
    this.yScale = yScale;
    this.width = width;
    this.height = height;
    this.margin = margin;

    // --- Grid ---
    const gridG = g.append("g").attr("class", "ydi-grid");
    // Vertical
    gridG.selectAll("line.v")
      .data(data.map(d => d.x))
      .join("line")
      .attr("x1", d => xScale(d))
      .attr("x2", d => xScale(d))
      .attr("y1", 0)
      .attr("y2", height);
    // Horizontal
    gridG.selectAll("line.h")
      .data(yScale.ticks(5))
      .join("line")
      .attr("x1", 0)
      .attr("x2", width)
      .attr("y1", d => yScale(d))
      .attr("y2", d => yScale(d));

    // --- Axes ---
    const yFmt = d3.format(cfg.yFormat);

    // X axis
    const xAxisG = g.append("g")
      .attr("class", "axis x-axis")
      .attr("transform", `translate(0,${height})`)
      .call(
        d3.axisBottom(xScale)
          .tickValues(data.map(d => d.x).filter((_, i) => i % (isMobile ? 4 : 2) === 0 || _ === endX))
          .tickFormat(d => d === startX ? d : "'" + String(d).slice(-2))
          .tickSize(6)
      );
    xAxisG.select(".domain").remove();

    // Y axis labels (text only, no axis line) on the left side of grid
    g.selectAll(".ydi-y-label")
      .data(yScale.ticks(5))
      .join("text")
      .attr("class", "ydi-y-label")
      .attr("x", -5)
      .attr("y", d => yScale(d))
      .attr("dy", "0.35em")
      .attr("text-anchor", "end")
      .attr("fill", "#888")
      .attr("font-size", 11)
      .text(d => yFmt(d));

    // --- Divider line at drawStartX ---
    g.append("line")
      .attr("class", "ydi-divider")
      .attr("x1", xScale(drawStartX))
      .attr("x2", xScale(drawStartX))
      .attr("y1", 0)
      .attr("y2", height);

    // --- Lines ---
    const line = d3.line()
      .x(d => xScale(d.x))
      .y(d => yScale(d.y));

    // Known data (up to drawStartX)
    const knownData = data.filter(d => d.x <= drawStartX);
    g.append("path")
      .attr("class", "ydi-known-line")
      .attr("d", line(knownData))
      .attr("stroke", cfg.colors.known);

    // --- ClipPath for actual data ---
    const clipId = `ydi-clip-${cfg.id}`;
    const clipRect = svg.append("defs")
      .append("clipPath")
      .attr("id", clipId)
      .append("rect")
      .attr("x", 0)
      .attr("y", 0)
      .attr("width", xScale(drawStartX) + margin.left - 1)
      .attr("height", height + margin.top + margin.bottom);

    this.clipRect = clipRect;

    // Actual data group (clipped)
    const actualG = g.append("g")
      .attr("clip-path", `url(#${clipId})`);

    // Area
    const area = d3.area()
      .x(d => xScale(d.x))
      .y0(height)
      .y1(d => yScale(d.y));

    const actualData = data.filter(d => d.x >= drawStartX);
    actualG.append("path")
      .attr("class", "ydi-area")
      .attr("d", area(actualData))
      .attr("fill", cfg.colors.actual);

    // Actual line (from drawStartX onward)
    actualG.append("path")
      .attr("class", "ydi-actual-line")
      .attr("d", line(actualData))
      .attr("stroke", cfg.colors.actual);

    // Actual endpoint
    const endPt = data[data.length - 1];
    actualG.append("circle")
      .attr("cx", xScale(endPt.x))
      .attr("cy", yScale(endPt.y))
      .attr("r", 5)
      .attr("fill", cfg.colors.actual);

    // Actual end value label
    actualG.append("text")
      .attr("class", "ydi-value-label")
      .attr("x", xScale(endPt.x) + 10)
      .attr("y", yScale(endPt.y))
      .attr("dy", "0.35em")
      .attr("fill", cfg.colors.actual)
      .text(yFmt(endPt.y) + cfg.unit);

    // --- Start & mid point markers ---
    const startPt = data[0];
    g.append("circle")
      .attr("cx", xScale(startPt.x))
      .attr("cy", yScale(startPt.y))
      .attr("r", 5)
      .attr("fill", cfg.colors.known);

    g.append("text")
      .attr("class", "ydi-value-label")
      .attr("x", xScale(startPt.x) - 10)
      .attr("y", yScale(startPt.y))
      .attr("dy", "0.35em")
      .attr("text-anchor", "end")
      .attr("fill", cfg.colors.known)
      .text(yFmt(startPt.y) + cfg.unit);

    // Mid point (drawStartX)
    const midPt = data[drawStartIndex];
    g.append("circle")
      .attr("cx", xScale(midPt.x))
      .attr("cy", yScale(midPt.y))
      .attr("r", 5)
      .attr("fill", cfg.colors.known);

    const midLabelDy = drawStartIndex > 0 && midPt.y > data[drawStartIndex - 1].y ? -12 : 16;
    g.append("text")
      .attr("class", "ydi-value-label")
      .attr("x", xScale(midPt.x) - 8)
      .attr("y", yScale(midPt.y) + midLabelDy)
      .attr("text-anchor", "end")
      .attr("fill", cfg.colors.known)
      .text(yFmt(midPt.y) + cfg.unit);

    // --- User drawing data ---
    this.userData = data
      .filter(d => d.x >= drawStartX && d.x <= endX)
      .map(d => ({ x: d.x, y: d.y, userY: null, defined: false }));
    // First point is anchored
    this.userData[0].userY = midPt.y;
    this.userData[0].defined = true;

    // Flash rects
    const flashRects = g.append("g").attr("class", "ydi-flash-rects");
    this.flashRectsSel = flashRects.selectAll("rect")
      .data(this.userData.slice(1))
      .join("rect")
      .attr("class", "ydi-flash-rect ydi-pending")
      .attr("x", d => xScale(d.x) - (xScale(xStep) - xScale(0)) / 2)
      .attr("y", 0)
      .attr("width", xScale(xStep) - xScale(0))
      .attr("height", height);

    // User line path
    this.userLineSel = g.append("path")
      .attr("class", "ydi-user-line")
      .attr("stroke", cfg.colors.user);

    // User endpoint circle
    this.userCircleSel = g.append("circle")
      .attr("class", "ydi-endpoint")
      .attr("r", 5)
      .attr("fill", cfg.colors.user)
      .attr("opacity", 0);

    // User value label
    this.userValueSel = g.append("text")
      .attr("class", "ydi-value-label")
      .attr("dy", "0.35em")
      .attr("fill", cfg.colors.user)
      .attr("opacity", 0);

    // --- Draw prompt ---
    const promptG = g.append("text")
      .attr("class", "ydi-draw-prompt")
      .attr("x", xScale((drawStartX + endX) / 2))
      .attr("y", height / 3);

    cfg.drawPrompt.forEach((line, i) => {
      promptG.append("tspan")
        .attr("x", xScale((drawStartX + endX) / 2))
        .attr("dy", i === 0 ? 0 : "1.4em")
        .text(line);
    });

    // --- Drag rect (invisible hit zone) ---
    const dragRect = g.append("rect")
      .attr("class", "ydi-drag-rect")
      .attr("x", xScale(drawStartX))
      .attr("y", 0)
      .attr("width", xScale(endX) - xScale(drawStartX))
      .attr("height", height)
      .attr("fill", cfg.colors.user);

    // --- Drag behavior ---
    const self = this;
    const drag = d3.drag()
      .on("drag", function(event) { self._handleDrag(event, this); })
      .on("start", function(event) { self._handleDrag(event, this); });

    // Desktop: attach to entire SVG for easier drawing; mobile: drag rect only
    if (window.innerWidth > 600) {
      g.call(drag).on("click", function(event) { self._handleDrag(event, this); });
    } else {
      dragRect.call(drag).on("click", function(event) { self._handleDrag(event, this); });
    }

    // Store references
    this.yFmt = yFmt;
    this.xStep = xStep;
    this.endX = endX;
    this.drawStartX = drawStartX;
    this.actualEndValue = endPt.y;
    this.actualEndY = yScale(endPt.y);

    // --- ResizeObserver ---
    if (!this._resizeObserver) {
      this._resizeObserver = new ResizeObserver(() => {
        if (this.state === "revealed") return;
        // Debounce
        clearTimeout(this._resizeTimer);
        this._resizeTimer = setTimeout(() => {
          if (this.state !== "revealed") {
            this._render();
          }
        }, 200);
      });
      this._resizeObserver.observe(this.svgContainer);
    }
  }

  _handleDrag(event, el) {
    if (this.state === "revealed") return;

    const { xScale, yScale, cfg, userData, width, height } = this;
    const [mx, my] = d3.pointer(event, this.g.node());
    const drawStartX = cfg.drawStartX;
    const endX = this.endX;
    const xStep = this.xStep;

    const xVal = clamp(drawStartX + xStep * 0.5, endX + xStep * 0.5, xScale.invert(mx));
    const yVal = clamp(yScale.domain()[0], yScale.domain()[1], yScale.invert(my));

    // Find last defined point for interpolation
    let lastDefinedIdx = 0;
    for (let i = userData.length - 1; i >= 0; i--) {
      if (userData[i].defined) { lastDefinedIdx = i; break; }
    }

    // Set value and interpolate gaps
    userData.forEach((d, i) => {
      if (Math.abs(d.x - xVal) < xStep * 0.5) {
        d.userY = yVal;
        d.defined = true;

        // Interpolate between last defined and current
        const gap = i - lastDefinedIdx;
        if (gap > 1) {
          for (let j = 1; j < gap; j++) {
            const t = j / gap;
            userData[lastDefinedIdx + j].userY =
              userData[lastDefinedIdx].userY * (1 - t) + yVal * t;
            userData[lastDefinedIdx + j].defined = true;
          }
        }
      }
    });

    // Update state
    if (this.state === "idle") {
      this.state = "drawing";
      this.wrapEl.classList.add("ydi-drag-started");
    }

    // Update flash rects
    this.flashRectsSel.each(function(d) {
      if (d.defined) {
        d3.select(this).classed("ydi-pending", false).attr("fill-opacity", 0);
      }
    });

    // Update user line
    const userLine = d3.line()
      .defined(d => d.defined)
      .x(d => xScale(d.x))
      .y(d => yScale(d.userY));

    this.userLineSel.attr("d", userLine(userData));

    // Update endpoint
    const lastDefined = [...userData].reverse().find(d => d.defined);
    if (lastDefined && lastDefined.x > this.drawStartX) {
      this.userCircleSel
        .attr("cx", xScale(lastDefined.x))
        .attr("cy", yScale(lastDefined.userY))
        .attr("opacity", 1);

      const yFmt = this.yFmt;
      const displayVal = cfg.precision
        ? yFmt(parseFloat(lastDefined.userY.toFixed(cfg.precision)))
        : yFmt(lastDefined.userY);

      this.userValueSel
        .attr("x", xScale(lastDefined.x) + 10)
        .attr("y", yScale(lastDefined.userY))
        .attr("text-anchor", "start")
        .attr("opacity", 1)
        .text(displayVal + cfg.unit);
    }

    // Check if all points are defined
    if (userData.every(d => d.defined)) {
      if (this.state !== "ready") {
        this.state = "ready";
        this.wrapEl.classList.add("ydi-ready");
      }
    }
  }

  _reveal() {
    if (this.state !== "ready") return;
    this.state = "revealed";
    this.wrapEl.classList.add("ydi-guessed");

    const { xScale, yScale, width, margin, cfg, userData } = this;

    // Animate clipPath
    this.clipRect
      .transition()
      .duration(1000)
      .ease(d3.easeLinear)
      .attr("width", width + margin.left + margin.right + 20);

    // Legend on the right side of the chart
    const legendX = width + 12;
    const legendY = 0;
    const legendG = this.g.append("g")
      .attr("class", "ydi-legend")
      .attr("transform", `translate(${legendX},${legendY})`);

    // User prediction legend
    legendG.append("line")
      .attr("x1", 0).attr("x2", 20)
      .attr("y1", 0).attr("y2", 0)
      .attr("stroke", cfg.colors.user)
      .attr("stroke-width", 3)
      .attr("stroke-dasharray", "1 7")
      .attr("stroke-linecap", "round");
    legendG.append("text")
      .attr("class", "ydi-legend-label")
      .attr("x", 26).attr("y", 0)
      .attr("dy", "0.35em")
      .attr("fill", cfg.colors.user)
      .text("あなたの予測");

    // Actual data legend
    legendG.append("line")
      .attr("x1", 0).attr("x2", 20)
      .attr("y1", 22).attr("y2", 22)
      .attr("stroke", cfg.colors.actual)
      .attr("stroke-width", 3)
      .attr("stroke-linecap", "round");
    legendG.append("text")
      .attr("class", "ydi-legend-label")
      .attr("x", 26).attr("y", 22)
      .attr("dy", "0.35em")
      .attr("fill", cfg.colors.actual)
      .text("実際のデータ");

    // Adjust user value label if too close to actual
    const userEndY = yScale(userData[userData.length - 1].userY);
    const actualEndY = this.actualEndY;
    if (Math.abs(userEndY - actualEndY) < 18) {
      const offset = userEndY < actualEndY ? -18 : 18;
      this.userValueSel
        .transition()
        .duration(300)
        .attr("y", actualEndY + offset);
      this.userCircleSel
        .transition()
        .duration(300);
    }

    // Calculate score
    const scores = userData.slice(1).map(d => d.userY / d.y);
    const totalError = d3.sum(scores, s => Math.abs(1 - s));
    const avgRatio = d3.mean(scores);

    let label, cls;
    if (totalError < 0.5) {
      label = "ほぼ正解！";
      cls = "ydi-score-good";
    } else if (totalError < 2) {
      label = "惜しい！";
      cls = "ydi-score-ok";
    } else {
      label = avgRatio < 0.7 ? "控えめな予測でした" : avgRatio > 1.3 ? "攻めた予測でした" : "ずれていますね";
      cls = "ydi-score-off";
    }

    // Build download data
    const exportData = userData.map(d => ({
      x: d.x,
      actual: d.y,
      prediction: cfg.precision ? parseFloat(d.userY.toFixed(cfg.precision)) : Math.round(d.userY),
    }));

    const afterEl = this.wrapEl.querySelector(".ydi-after-reveal");
    const scoreHTML = `<div class="ydi-score ${cls}">${label}</div>`;
    const downloadHTML = `<div class="ydi-download-area">
      <button class="ydi-download-btn" data-fmt="csv">CSV</button>
      <button class="ydi-download-btn" data-fmt="json">JSON</button>
    </div>`;
    afterEl.innerHTML = scoreHTML
      + (cfg.afterRevealHTML ? `<p style="margin-top:8px">${cfg.afterRevealHTML}</p>` : "")
      + downloadHTML;

    // Download handlers
    afterEl.querySelectorAll(".ydi-download-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const fmt = btn.dataset.fmt;
        let content, mime, ext;
        if (fmt === "csv") {
          const header = "x,actual,prediction";
          const rows = exportData.map(d => `${d.x},${d.actual},${d.prediction}`);
          content = [header, ...rows].join("\n");
          mime = "text/csv";
          ext = "csv";
        } else {
          content = JSON.stringify(exportData, null, 2);
          mime = "application/json";
          ext = "json";
        }
        const blob = new Blob([content], { type: mime });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${cfg.id}-prediction.${ext}`;
        a.click();
        URL.revokeObjectURL(a.href);
      });
    });

    // Dispatch event
    this.wrapEl.dispatchEvent(new CustomEvent("you-draw-it:revealed", {
      bubbles: true,
      detail: { id: cfg.id, totalError, avgRatio, label },
    }));
  }
}

// --------------- サムネイル生成 ---------------
async function generateThumbnail() {
  const svgEl = document.querySelector(".ydi-chart-wrap svg");
  if (!svgEl) return null;
  try {
    const clone = svgEl.cloneNode(true);
    // Inline computed styles for accurate rendering
    clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");
    const svgData = new XMLSerializer().serializeToString(clone);
    const canvas = document.createElement("canvas");
    const svgW = parseFloat(svgEl.getAttribute("width")) || 640;
    const svgH = parseFloat(svgEl.getAttribute("height")) || 400;
    canvas.width = svgW * 2;
    canvas.height = svgH * 2;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    const img = new Image();
    const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = reject;
      img.src = url;
    });
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(url);
    return canvas.toDataURL("image/png");
  } catch (e) {
    console.warn("Thumbnail generation failed:", e);
    return null;
  }
}

async function loadProjectList() {
  const token = await getAccessToken();
  if (!token) {
    showMessage("ログインが必要です", "error");
    return;
  }

  const modal = document.getElementById("load-modal");
  const body = document.getElementById("load-modal-body");
  body.innerHTML = '<p class="ydi-empty">読み込み中...</p>';
  modal.classList.add("active");

  try {
    const res = await fetch(`${API_BASE}/api/projects?app=${APP_NAME}`, {
      headers: { "Authorization": `Bearer ${token}` },
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { projects } = await res.json();

    if (!projects || projects.length === 0) {
      body.innerHTML = '<p class="ydi-empty">保存されたプロジェクトはありません</p>';
      return;
    }

    body.innerHTML = "";
    projects.forEach(p => {
      const item = document.createElement("div");
      item.className = "ydi-project-item";
      const date = new Date(p.updated_at || p.created_at);
      const dateStr = date.toLocaleDateString("ja-JP", {
        year: "numeric", month: "short", day: "numeric",
      });
      item.innerHTML = `
        <span class="ydi-project-name">${escapeHTML(p.name)}</span>
        <span class="ydi-project-date">${dateStr}</span>
      `;
      item.addEventListener("click", () => loadProject(p.id));
      body.appendChild(item);
    });
  } catch (e) {
    console.error("Load list failed:", e);
    body.innerHTML = '<p class="ydi-empty">読み込みに失敗しました</p>';
  }
}

async function loadProject(projectId) {

  try {
    const res = await fetch(`${API_BASE}/api/projects/${projectId}`, {
      headers: { "Authorization": `Bearer ${token}` },

// --------------- ?project_id 自動読込 ---------------
async function autoLoadFromURL() {
  const params = new URLSearchParams(window.location.search);
  const projectId = params.get("project_id");
  if (!projectId) return;

  // Wait for auth to be ready
  const waitForAuth = () => new Promise(resolve => {
    if (window.datavizSupabase) return resolve();
    const check = setInterval(() => {
      if (window.datavizSupabase) { clearInterval(check); resolve(); }
    }, 200);
    setTimeout(() => { clearInterval(check); resolve(); }, 5000);
  });

  await waitForAuth();
  const token = await getAccessToken();
  if (!token) return;

  try {
    const res = await fetch(`${API_BASE}/api/projects/${projectId}`, {
      headers: { "Authorization": `Bearer ${token}` },
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (data.charts && Array.isArray(data.charts)) {
      restoreFormFromConfig(data.charts[0]);
    }
  } catch (e) {
    console.error("Auto-load failed:", e);
  }
}

// --------------- フォーム復元（読込時） ---------------
function restoreFormFromConfig(cfg) {
  if (!cfg || !cfg.data) return;
  uploadedData = cfg.data;
  onDataLoaded();
  document.getElementById("quiz-title").value = cfg.title || "";
  document.getElementById("quiz-unit").value = cfg.unit || "";
  if (cfg.drawStartX) {
    document.getElementById("quiz-draw-start").value = cfg.drawStartX;
  }
  updatePreview();
}

// --------------- フォーム: データアップロード ---------------
const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("file-input");
const dataPreview = document.getElementById("data-preview");
const drawStartSelect = document.getElementById("quiz-draw-start");
const titleInput = document.getElementById("quiz-title");
const unitInput = document.getElementById("quiz-unit");
const previewSection = document.getElementById("preview-section");
const previewContainer = document.getElementById("preview-container");

dropzone.addEventListener("click", () => fileInput.click());
dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("dragover"); });
dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
fileInput.addEventListener("change", (e) => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    try {
      let parsed;
      if (file.name.endsWith(".json")) {
        parsed = JSON.parse(text);
        if (!Array.isArray(parsed)) throw new Error("JSONは配列形式にしてください");
      } else {
        const rows = d3.csvParse(text);
        const cols = Object.keys(rows[0] || {});
        if (cols.length < 2) throw new Error("2列以上のCSVが必要です");
        parsed = rows.map(d => {
          const rawX = d[cols[0]];
          const rawY = d[cols[1]];
          // xを数値に変換（年、数値、日付の年部分に対応）
          let x = parseFloat(rawX);
          if (isNaN(x)) {
            // 日付文字列から年を抽出（例: "2020-01-01" → 2020）
            const dateMatch = String(rawX).match(/(\d{4})/);
            if (dateMatch) x = parseInt(dateMatch[1]);
          }
          const y = parseFloat(String(rawY).replace(/,/g, ""));
          return { x, y };
        });
      }
      // Validate
      parsed = parsed.filter(d => !isNaN(d.x) && !isNaN(d.y));
      if (parsed.length < 3) throw new Error("3点以上のデータが必要です");
      parsed.sort((a, b) => a.x - b.x);

      uploadedData = parsed;
      onDataLoaded();
    } catch (err) {
      showMessage("データの読み込みに失敗: " + err.message, "error");
    }
  };
  reader.readAsText(file);
}

function onDataLoaded() {
  // Update dropzone
  dropzone.classList.add("loaded");
  dropzone.querySelector("p").textContent = `${uploadedData.length}件のデータを読み込みました`;

  // Show data preview table
  let html = "<table><thead><tr><th>x</th><th>y</th></tr></thead><tbody>";
  uploadedData.forEach(d => { html += `<tr><td>${d.x}</td><td>${d.y}</td></tr>`; });
  html += "</tbody></table>";
  dataPreview.innerHTML = html;
  dataPreview.style.display = "block";

  // Populate drawStartX dropdown (exclude first and last)
  drawStartSelect.innerHTML = "";
  drawStartSelect.disabled = false;
  const xValues = uploadedData.map(d => d.x);
  // Default: middle-ish point
  const midIdx = Math.floor(xValues.length / 2);
  xValues.forEach((x, i) => {
    if (i === 0 || i === xValues.length - 1) return; // exclude first and last
    const opt = document.createElement("option");
    opt.value = x;
    opt.textContent = x;
    if (i === midIdx) opt.selected = true;
    drawStartSelect.appendChild(opt);
  });

  updatePreview();
}

// --------------- フォーム: プレビュー更新 ---------------
let previewDebounce = null;

function updatePreview() {
  if (!uploadedData) return;
  clearTimeout(previewDebounce);
  previewDebounce = setTimeout(() => {
    const cfg = buildConfig();
    if (!cfg) return;

    previewSection.style.display = "block";
    previewContainer.innerHTML = "";
    // Remove existing chart wraps from preview
    previewContainer.querySelectorAll(".ydi-chart-wrap").forEach(el => el.remove());

    currentConfigs = [cfg];
    new ChartInstance(previewContainer, cfg);
  }, 200);
}

function buildConfig() {
  if (!uploadedData || uploadedData.length < 3) return null;
  const drawStartX = parseFloat(drawStartSelect.value);
  if (isNaN(drawStartX)) return null;

  return {
    id: "preview",
    title: titleInput.value || "タイトル未設定",
    data: uploadedData,
    drawStartX: drawStartX,
    unit: unitInput.value || "",
    yFormat: ",.0f",
    precision: 0,
    yExtent: 1.5,
    buttonText: "答え合わせ",
    drawPrompt: ["線を描いて", "予測してみよう"],
  };
}

// Form change listeners
drawStartSelect.addEventListener("change", updatePreview);
titleInput.addEventListener("input", updatePreview);
unitInput.addEventListener("input", updatePreview);
